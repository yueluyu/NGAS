 rd_updated_codex_content_title:0 "§L截至 §H2026年x月x日：§!\n\n\n\n\n\n\n什么都没有\n—————————————————————————\n§W向 Red Dusk 团队中众多才华横溢的开发者致以感谢与敬意，他们凭借热情与爱持续投入 Red Dusk 的开发。尽管人力与资源有限、开发进度缓慢，他们仍尽最大努力让这些更新成为可能。§!\n\n§Y致 Red Dusk 社区：向你们致敬！§!§!"
 LOBBY_NEXT_UPDATE_TT_TITLE1:0 "地平线之上，另有天地……\n§Y人民共和国……§!"
 LOBBY_NEXT_UPDATE_TT_DELAY1:0 "§g国土沦丧、大众嗟伤的记忆已慢慢远去；狂热的革命浪潮似乎也已偃旗息鼓。未来究竟在何方……\n\n\n\n\n\n\n£PRC_overview_2_embed \n\n\n\n\n\n\n十亿中国人似乎正从对目标缺失的迷茫中缓缓走出。不再有毛泽东号召他们继续无产阶级革命、打倒一切旧秩序之后，邓小平“改革开放”的现代化呼吁奇迹般地令中国在短短十年间180度调转方向，走上了追求物质富裕的道路。一切美好景象似乎都将继续被梦幻的泡沫所包裹，直到资本主义世界体系用经济危机的必然规律给了中国人当头一棒；发展停滞、政治动荡，曾经的美梦最终在天安门广场前被碾了个粉碎。\n\n如今距离那场灾变又过去了十年。当下的中国正由拥有浓厚实用主义色彩的工程师集团所统治着；稳定似乎已经回归，而又一段爆炸性经济增长的时代似乎又将到来；然而强敌环伺、台湾问题日渐严峻的形势也令人心神不宁。§!\n\n\n\n\n\n£PRC_overview_embed \n\n\n\n\n\n\n\n§W当下是又到了民族最危险的时刻？还是重回巅峰的千载良机……且看§S破晓复兴：一阶段§!§!。"
 LOBBY_NEXT_UPDATE_TT_TITLE2:0 "地平线之上，仍有未竟的征途……\n§Y崩坏的文明……§!"
 LOBBY_NEXT_UPDATE_TT_DELAY2:0 "§g当世界迈入新世纪之际，伊朗也迎来了新的十年，一个以混乱拉开序幕的十年。\n\n\n\n\n\n\n£PER_overview_embed \n\n\n\n\n\n\n经过哈塔米总统多年来对所有政治和社会派系的妥协让步，如今似乎无人感到满意。无论是“改革主义-自由派”学生，还是伊斯兰革命中强硬的“社会主义-革命派”老战士。\n\n所有人都对现状心生不满。再无人满足于“中间路线”，也无人再在乎§G“伊斯兰民主”§!的口号。不，每个人都在谋划——从革命元老到最激进的改革派青年，所有人都在选边站队。\n\n伊朗政治光谱分裂为四大阵营：以哈塔米总统为首的§t“温和左派”§!，前总统拉夫桑贾尼领衔的§7“温和右派”§!，以及分别由§W穆罕默德·穆萨维·霍恩尼哈§!和§W马哈茂德·艾哈迈迪-内贾德§!领导的§t“激进左派”§!与§7“激进右派”§!。\n\n当伊朗从内部逐渐腐朽时，她的敌人们正再度图谋毁灭这个国家。西方边境，萨达姆似乎仍未放弃疯狂野心；来自§3西方的威胁§!日益逼近；嗜血的逊尼派威胁也在持续加剧。然而即便如此，许多人仍将目光投向§R@SOV苏联§!——这个受重创日渐衰弱的巨人，或许仍是伊朗维系地区地位的潜在盟友。\n\n\n\n\n\n\n£PER_overview_2_embed \n\n\n\n\n\n\n§W在许多人眼中，伊朗的未来虽未成定局，却已晦暗无光。这个古老国度的旧躯壳正在腐烂和燃烧，而或许在§S破晓复兴：一阶段§!中，一只新的凤凰将从她的灰烬中涅槃重生§!。§!"