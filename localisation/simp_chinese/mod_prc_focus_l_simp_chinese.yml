 PRC_preparing_to_join_wto:0 "加紧入世谈判"
 PRC_preparing_to_join_wto_desc:0 "20世纪80年代中期以来，是否参加关贸总协定和世贸组织为基石的多边贸易体制，成为衡量一国是否负责任地加入国际社会、该与世界经济衔接国经济是否的重要尺度。\n\n但自改革开放以来，因长期被排斥在世界多边贸易体系之外，我们不得不主要依靠双边磋商和协议来协调对外经贸关系，使国内企业和产品在进入国际市场时受到了许多歧视性或不公正待遇。\n\n目前，农业和服务业是我们同西方相持不下的难点，如果我们能在实质性的谈判中处理好这点，加入世贸就是板上钉钉的事情了，也就相当于拿到了国际市场的多张通行证。"
