 PRC_westren_development:0 "西部大开发"
 PRC_westren_development_desc:0 "西部地区自然资源丰富，市场潜力大，战略位置重要。但由于自然、历史、社会等原因，西部地区经济发展相对落后。\n\n为了缩小东西部经济发展的差距，我们应采取适当的政策，让西部成为国家发展的战略支撑与动力源泉。"
