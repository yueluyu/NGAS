PRC_lingering_power_remains:0 "余威尚存"
PRC_lingering_power_remains_desc:0 "权力完成了交接，但时代没有。\n\n江泽民离开了总书记的位置，却没有离开共和国的权力中心。那些在九十年代成长起来的干部依旧掌握着重要岗位，那些塑造了中国崛起的发展路线也仍在继续影响中央的决策。\n\n新人与旧人、未来与过去、变革与延续，共同构成了今天的政治格局。而在这场看不见的较量中，属于九十年代的政治遗产仍然占据着上风。"
PRC_come_to_the_Forefront:0 "时代更迭"
PRC_come_to_the_Forefront_desc:0 "权力完成了交接，而时代终于向前。\n\n十余年来，共和国始终沿着既定的轨道高速前进。然而随着新世纪的到来，那些成长于改革年代的干部开始接过国家的舵轮。他们继承了过去的成果，也必须面对过去留下的问题。\n\n新人与旧人、稳定与改革、发展与公平，共同构成了今天的政治现实。而在这场缓慢而深刻的变迁之中，属于后来者的声音正在变得越来越响亮。"
