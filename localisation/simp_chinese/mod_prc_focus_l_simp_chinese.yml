 PRC_after_the_reform:0 "何去何从"
 PRC_after_the_reform_desc:0 "二十余年前，我们选择了一条前所未有的道路。\n\n从农村改革到经济特区，从市场开放到加入世界贸易组织，中国在短短数十年间完成了西方国家上百年才完成的工业化与城市化进程。曾经贫穷落后的国家正在迅速崛起，成为世界经济中不可忽视的一部分。\n\n然而，改革带来的不仅仅是繁荣。国有企业改制引发的大规模下岗仍令人记忆犹新，贫富差距与地区发展失衡愈发明显，腐败、失业与社会矛盾也伴随着高速增长不断积累。\n\n改革开放改变了中国，却没有回答中国未来的一切问题。当共和国迈入新世纪时，人们忽然发现：他们已经知道自己是如何走到今天的。\n但改革之后，又该走向哪里？"
 PRC_sange_daibiao:0 "确立“三个代表”重要思想"
 PRC_sange_daibiao_desc:0 "江泽民同志提出的“三个代表”重要思想，立足时代变局，回答了长期执政条件下建设什么样的党、怎样建设党的根本问题。始终代表中国先进生产力的发展要求、先进文化的前进方向、最广大人民的根本利益，成为党引领国家发展、应对风险挑战的根本遵循与行动纲领。"
 PRC_fazhan_xianjin_wenhua:0 "立党之本"
 PRC_fazhan_xianjin_wenhua_desc:0 "党来自人民，植根于人民，服务于人民。始终代表最广大人民的根本利益，是党立于不败之地的根基，也是党不断发展壮大的力量源泉。"
 PRC_jianchi_zhidao:0 "坚持党的指导"
 PRC_jianchi_zhidao_desc:0"中国共产党始终在历史的潮流中高举先进的大旗。党在整个社会主义现代化建设中，对于各个领域，各个方面的领导必须得到保障。只有始终要求和保障党的先锋队性质得到充分的发挥，才能以党的以科学性、纯洁性、革命性引领中国继续发展。"
 PRC_sixiang_lilun:0 "思想理论建设"
 PRC_sixiang_lilun_desc:0 "早在中共十二大，邓小平就提出了要建设有中国特色的社会主义这一理论。时至今日，中国特色社会主义理论体系已经随着党和国家在十余年建设过程中的不断实践而不断发展、积累，我们的思想理论建设是时候跃上一个新的台阶了。"
 PRC_dang_de_xianjin:0 "党的先进性"
 PRC_dang_de_xianjin_desc:0"中国共产党是中国工人阶级的先锋队，也是中国人民和中华民族的先锋队。只有发挥好党的先进性，发挥好党的先锋队作用，才能办好中国的事，实现民族复兴。我们必须把握好党的先进性，以党的纪律、党的宗旨、党的组织保障党的先进性"
 PRC_fazhan_xianjinshengchan:0 "执政之基"
 PRC_fazhan_xianjin_wenhua_desc:0 "“三个代表”首要便是代表中国先进生产力的发展要求。在这一思想指引下，党必须始终紧紧抓住发展这个执政兴国的第一要务，不断解放和发展社会生产力。唯有经济基础稳固，上层建筑才能坚如磐石。"
 PRC_pizhun_qiyejia_rudang:0 "批准企业家入党"
 PRC_pizhun_qiyejia_rudang_desc:0"企业是推动经济发展和创新创造的生力军，党始终把民营企业和民营企业家当作自己人。为了适应社会经济发展的需要，追随‘三个代表’重要思想的引领，我们应当放弃对于企业家的一些成见，积极地吸纳有着先锋性的民营企业家们。"
 PRC_yinjin_jishu:0 "引进先进技术"
 PRC_yinjin_jishu_desc:0"邓小平曾精准地提出：‘科学技术是第一生产力’。当代中国对于社会经济和生产力的发展的需要前所未有的庞大。我们应当积极地推行对外开放的基本国策，以引进外国先进技术为手段，进一步助力生产力发展。"
 PRC_yushi_jujin:0 "与时俱进"
 PRC_yushi_jujin_desc:0 "马克思主义是发展的思想，历史上从没有一成不变的真理。在科技进步与社会发展的速度日益加快的时代，党和国家必须以自身的创造力与创新能力不断与时俱进，积极地引进外来先进，积极地鼓励自主创新。"
 PRC_daibiao_renmin_liyi:0 "力量之源"
 PRC_daibiao_renmin_liyi_desc:0 "什么是党的力量之源？答案显而易见——人民。党自始至终的中国人民的党，秉承着为中华人民谋幸福，为中华民族谋复兴的初心与使命不断奋斗。只有搞清这一点关系，才能搞清楚中国共产党、中国特色社会主义与资本主义的本质区别。"
 PRC_xiaokang_shehui:0 "落实“全面小康”政策"
 PRC_xiaokang_shehui_desc:0 "民亦劳止,汔可小康。摆脱绝对贫穷，实现全面小康始终是中华民族五千年以来的伟大愿望。随着中国经济体量的扩大，沿海沿江等率先开放一带的迅速发展，我们应当更加协调各区域、城乡之间的经济关系，推动小康社会的全面建成。"
 PRC_tuijin_fuyu:0 "推进共同富裕"
 PRC_tuijin_fuyu_desc:0 "共同富裕是中国特色社会主义的本质要求。随着改革开放的推进，社会主义经济建设成果日益显著，邓小平曾提出的“先富带动后富”理念已从设想转变成我们正在推进的现实。"
 PRC_guanche_200_years:0 "贯彻“二个一百年”"
 PRC_xin_lantu:0 "擘画新蓝图"
 PRC_the_ninth_five_year_Plan:0 "收尾第九个五年计划"
 PRC_the_ninth_five_year_Plan_desc:0 "“九五”计划作为社会主义市场经济体制基本建立后的第一个五年计划，也是跨世纪的五年计划。\n\n今年作为“九五”计划的收官之年，我们要争取做到全面完成现代化建设的第二步战略部署，实现人均国民生产总值比1980年翻两番.；基本消除贫困现象，人民生活达到小康水平；加快现代企业制度建设，初步建立社会主义市场经济体制。"
 PRC_the_policy_of_three_Fs:0 "三农政策"
 PRC_the_policy_of_three_Fs_desc:0 "农村是中华民族的摇篮，农业是国民经济的基础，农民是我们的衣食父母。失去了这三者，也就失去了立国之本。"
