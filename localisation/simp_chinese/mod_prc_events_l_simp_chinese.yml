prc_news.1.t:0 "中华人民共和国第十届全国人民代表大会第一次会议正式闭幕"
prc_news.1.d:0 "几天前，中华人民共和国第十届全国人民代表大会第一次全体会议在北京召开。第一次会议议程上选举了中华人民共和国主席为中央委员会总书记胡锦涛，并根据胡锦涛的提名决定国务院总理的人选即温家宝。\n\n这标志着中国的领导权正式转交于由胡锦涛和温家宝所代表的新一代领导集团。"
