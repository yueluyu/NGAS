prc_jy.1.t:0 "“砺剑-2000”演习"
prc_jy.1.d:0 "陆、海、空及导弹部队在本日上午举行全军世纪大演兵。\n\n中共中央总书记、中国国家主席、中央军委主席江泽民亲赴现场检阅军队。\n演兵同时在燕山脚下、渤海海域、内蒙古草原、东北密林四地展开，参演兵力达万余人，涵盖全军各大军区与各军兵种，包括快反部队、海军陆战队、战略导弹部队等诸多精锐力量。\n\n且本次包含现地演兵、网上对抗、理论交流三项核心内容，重点演示了新“三打三防”战术，还运用计算机网络、电子对抗等高新技术，演练诸军兵种联合作战，检验了新型作战思想与武器装备。比如渤海海域战舰织起防空火网，东北密林新型导弹精准命中目标，燕山脚下上演陆海空立体协同作战。"
prc_jy.1.a:0 "科技强军，质量建军"
prc_news.2.t:0 "中国人民共和国召开世纪大演兵"
prc_news.2.d:0 "不久前，中国人民共和国召开全军科技练兵成果汇报演示暨“砺剑-2000”演习。这是1964年“大比武”以来，中国人民解放军组织实施的演练层次最高、运用技术最新、涉及范围最广的全军性军事训练成果交流活动\n\n中国方面声明演习不针对任何国家，旨在强化国防能力与维护地区稳定。"
prc_news.2.a:0 "亚太地区的实力天平正在慢慢倾斜..."
prc_news.2.b:0 "彰显我们的实力"
prc_hk.1.t:0 "香港之行"
prc_hk.1.d:0 "张宝华：江主席，你觉得董先生连任好不好啊？\n江泽民：好啊。\n张宝华：中央也支持他吗？\n江泽民：啊 当然啦。\n张宝华：那为什么这么早就提出了，是不是没有别的人选呢？\n江泽民：那我毕竟……没有什么时间再跟你讲啦……对不起……\n张宝华：董先生……那么……你会……\n张宝华：欧盟呢最近发表了一个报告说呢……呃……北京会透过一些渠道去影响、干预香港的法治，你对这个看法有什么回应呢？\n江泽民：没听到过这个说法。\n张宝华：是彭定康说的。\n\n江泽民：不，你不得……你们媒体千万要注意，不要“见着风，是得雨”。接到这些消息，你本身也要判断，明白这个意思吗？假使这种完全……无中生有的东西，你再帮他说一遍，你等于…这个东西…你…你也有责任吧。\n\n“你们有一个好，全世界跑到什么地方，你们比其他的西方记者啊，跑得还快。但是呢，问来问去的问题啊，都 too simple，啊，sometimes naïve！”\n\n张宝华：江主席，那，现在呢那么早，你们就是说支持董先生呢，会不会给人感觉就是内定了、是钦点了董先生呢？\n江泽民：她说什么？\n钱其琛：她讲支持董先生那么早是不是内定了，钦点了董先生。\n江泽民：没有……没有任何的意思。还是按照香港的……按照基本法、按照选举的法——去产生……\n张宝华：但是你们能不能……\n江泽民：你……刚才你问我啊，我可以回答你一句“无可奉告”，那你们又不高兴，那怎么办？\n张宝华：那董先生……\n江泽民：我讲的意思不是我是钦点他当下一任。你问我支持不支持，我说支持。我就明确可以告诉你。\n张宝华：江主席……\n\n江泽民：我觉得你们啊，你们我感觉你们新闻界还要学习一个。你们非常熟悉西方这一套的value，你们毕竟还 too young，明白我的意思吧？我告诉你们我是身经百战了，见得多啦！欸，西方的哪一个国家我没去过？媒体他们——你…你们要知道，美国的华莱士，比你们不知道高到哪里去啦！欸，我跟他谈笑风生！所以说媒体啊，要……还是要提高自己的知识水平！懂我的意思——识得唔识得啊？唉，我也给你们着急啊，真的。江泽民：你们今日……我以为……遍地……你们有一个好，全世界跑到什么地方，你们比其他的西方记者啊，跑得还快。但是呢，问来问去的问题啊，都 too simple，啊，sometimes naïve！懂了没啊？\n\n张宝华：那江主席，你觉得……\n江泽民：识得唔识得啊？\n江泽民：我很抱歉，我今天是作为一个长者跟你们讲的。我不是新闻工作者，但是我见得太多了，我……我有这个必要好告诉你们一点，人生的经验。\n记者：但是能不能说一下为什么支持董建华呢？\n江泽民：我刚才呢……最重要的一点……我刚才我很想啊，就是我每一次碰到你们我就讲，中国有一句话叫“闷声大发财”。我就什么话也不说，就是最好的！但是我想我见到你们这样热情啊，一句话不说也不好。所以你刚才你一定要——在宣传上将来如果你们报道上有偏差你们要负责的。我没有说要钦定，没有任何这个意思。但是你问……你一定要觉得要问我……对董先生支持不支持，我们不支持他？他现在是当特首，我们怎么能不支持特首？\n记者：但是如果说连任呢？\n江泽民：对不对？\n\n江泽民：欸，连任也要按照香港的法律啊，对不对？要要……要要按照香港的……当然，我们的决定权也是很重要的。香港的特区……特别行政区是属于中国……人民共和的中央人民政府啊。啊？到那时候我们会表态的！\n记者：但是呢……\n江泽民：明白这个意思吧？\n江泽民：你们啊，不要想……喜欢……这…欸呵弄个大新闻，说现在已经钦定了，再把我批判一番。\n记者：不是，但是呢就是……\n江泽民：你们啊，naïve！I'm angry！我跟你讲，你们这样子啊，那不行的！"
prc_hk.1.a:0 "“我今天算得罪了你们一下！”"
prc_zz.1.t:0 "江泽民同志宣告第十六次全国代表大会开幕"
prc_zz.1.d:0 "伴随着来自全国各地的2114名正式代表，40名特邀代表齐聚人民大会堂。江泽民同志宣布中国共产党第十六次全国代表大会正式开幕。大会由李鹏同志主持，江泽民同志代表第十五届中央委员会向大会作报告。\n同志们：\n  现在，我代表第十五届中央委员会向大会作报告。\n\n  中国共产党第十六次全国代表大会，是我们党在新世纪召开的第一次代表大会，也是我们党在开始实施社会主义现代化建设第三步战略部署的新形势下召开的一次十分重要的代表大会。\n\n  大会的主题是： 高举邓小平理论伟大旗帜，全面贯彻“三个代表”重要思想，继往开来，与时俱进，全面建设小康社会，加快推进社会主义现代化，为开创中国特色社会主义事业新局面而奋斗。\n\n  当人类社会跨入二十一世纪的时候，我国进入全面建设小康社会、加快推进社会主义现代化的新的发展阶段。国际局势正在发生深刻变化。世界多极化和经济全球化的趋势在曲折中发展，科技进步日新月异，综合国力竞争日趋激烈。形势逼人，不进则退。我们党必须坚定地站在时代潮流的前头，团结和带领全国各族人民，实现推进现代化建设、完成祖国统一、维护世界和平与促进共同发展这三大历史任务，在中国特色社会主义道路上实现中华民族的伟大复兴。这是历史和时代赋予我们党的庄严使命。"
prc_zz.1.a:0 "党的新征程要开始了！"
prc_zz.2.t:0 "第十六次全国代表大会闭幕"
prc_zz.2.d:0 "具有重大历史意义的中国共产党第十六次全国代表大会在选出新一届中央委员会、中央纪律检查委员会,并通过关于十五届中央委员会报告等决议后,今天上午在人民大会堂胜利闭幕。\n\n会上党通过的《中国共产党章程（修正案）》，把“三个代表”重要思想同马克思列宁主义、毛泽东思想、邓小平理论一道，作为党必须长期坚持的指导思想写入党章。将“三个代表”重要思想确立为党的指导思想。"
prc_zz.2.a:0 "交给年轻人吧！"
prc_zz.3.t:0 "第十六届中央委员会第一次全体会议"
prc_zz.3.d:0 "经中央委员会全体会议选举，中央政治局常务委员会委员胡锦涛同志正式当选为中国共产党中央委员会总书记。\n\n大会刚结束，面对摄像头的闪光灯，这位刚刚站在权力中心的领导人略显生涩地挥手致意，仿佛一个初次踏入全新舞台的青年。五十九岁的胡锦涛，年纪虽不算年轻，却在党内被视为新一代的代表，肩负着延续党和国家稳定的重任。\n\n他接过了共和国权力的交接棒，也承载着党内派系和社会对未来的诸多期待。他的面容平静，但每一个细微的表情都显露出他对即将到来的挑战的深知：从内部党务平衡、干部安排，到经济改革与社会治理，每一项决策都可能影响整个政治格局。他的路还很长，不只是管理现有事务，更是要在历史与现实之间找到稳定的接力方式，稳妥地引导新一代领导层逐步走向成熟。"
prc_zz.3.a:0 "党的第四代领导核心！"
prc_zz.4.t:0 "第十届全国人民代表大会第一次全体召开"
prc_zz.4.d_out:0 "2003年的春天，北京城沐浴在初春的暖阳之中，而人民大会堂内，气氛更是庄重而热烈。\n\n来自祖国各地的近3000名全国人大代表，肩负着13亿人民的重托，聚集在这里履行宪法和法律赋予的神圣职权。"
prc_zz.4.d:0 "春潮涌动，万物竞发。今天，北京人民大会堂内气氛庄重而热烈，来自全国各地区、各民族、各行业2985名全国人大代表齐聚一堂，肩负人民重托，共赴中华人民共和国第十届全国人民代表大会第一次会议。\n\n大会在雄壮的国歌声中隆重开幕。会场穹顶高悬的国徽熠熠生辉，代表们神情专注，目光中饱含对国家发展的期待。\n\n国务院总理朱镕基代表国务院向大会作政府工作报告。报告指出：“过去五年，是我国经济发展最快、质量效益明显提高的五年；是改革开放迈出重大步伐、社会主义市场经济体制初步建立的五年；是社会事业全面进步、人民生活总体达到小康水平的五年。”报告系统总结了九届全国人大期间的成就，从经济结构战略性调整、国有企业改革、宏观调控能力提升到科技教育投入、民主法制建设，勾勒出国家发展的坚实足迹。\n\n报告明确提出未来五年的主要任务：坚持以发展为主题，以结构调整为主线，以改革开放和科技进步为动力，以提高人民生活水平为根本出发点，全面建设小康社会。针对当时经济社会发展中的突出问题，报告强调要推进农村税费改革、完善社会保障体系、加强生态环境保护、深化金融体制改革，并对反腐败斗争、政府自身建设提出明确要求。\n\n这次会议，是在我国进入全面建设小康社会、加快推进社会主义现代化的新的发展阶段召开的一次重要会议。它既是对过去五年成就的总结，更是对未来发展的动员。"
prc_zz.4.a:0 "*鼓掌*"
prc_zz.5.t:0 "新任领导班子"
prc_zz.5.d:0 "全国人民代表大会的投票程序已落下帷幕，正式选举产生了新一届国家机构领导人。\n\n根据大会成员一致决定，胡锦涛当选为中华人民共和国主席，曾庆红当选为中华人民共和国副主席；吴邦国当选为第十届全国人民代表大会常务委员会委员长；选举江泽民为中华人民共和国中央军事委员会主席。\n\n根据国家主席胡锦涛的提名，决定任命温家宝为中华人民共和国国务院总理。"
prc_zz.5.a:0 "权力的正式交接"
wen_huan_zhu:0 "§Y温家宝§!将接替§Y朱镕基§!的职务"
prc_zz.6.t:0 "江泽民同志提出“三个代表”"
prc_zz.6.d:0 "江泽民同志在成为党的第三代领导核心后，一直在思考“建设什么样的党、怎样建设党”的问题。邓小平曾对以他的一个重要政治交代就是：“常委会的同志要聚精会神地抓党的建设。” \n\n这几天，江泽民同志在广东考察后，或许已经得到了答案。\n他认为，我们党之所以赢得人民的拥护，是因为在革命、建设、改革的各个历史时期，总是代表着中国先进生产力的发展要求，代表着中国先进文化的前进方向，代表着中国最广大人民的根本利益。\n还要求，“所有共产党员和领导干部，都要深刻认识和牢牢把握这‘三个代表’，用以指导自己的思想和行动”。\n\n江泽民同志提出的这“三个代表”可能已经对他深思熟虑的问题，做出了很好的解答。"
prc_zz.6.a:0 "党的立党之本、执政之基、力量之源"
prc_zz.7.t:0 "给朱总理的一封信"
#prc_zz.7.d:0 "总理：\n\n  我叫李昌平，今年37岁，经济学硕士，在乡镇工作已有17年，现任湖北省监利县棋盘乡党委书记。我怀着对党的无限忠诚，对农民的深切同情，含着泪水给您写信。我要对您说的是：现在农民真苦，农村真穷，农业真危险！\n\n  开春以来，我们这儿的农民快跑光了。连续二十多天来，“东风”大卡车（坐不起客车）没日没夜的满载着“外出打工”的农民奔向祖国四面八方的城市。我们乡有40000人，其中劳力18000人。现在外出25000人，其中劳力15000多人。今年人员外流和往年比有新的特点：一是盲流。过去一般是有目的的流动，今年多数农民是抱着碰“运气”和“要死也要死在城市，下辈子不做农民”的一种负气的心情外出。二是人数多、劳力多。过去外出打工的主要是女孩和部分富余劳力，现在是男女老少齐外出。三是弃田撂荒的多。过去出门一般都待田转包出去后再出门，今年根本不打招呼就走人。外出的人数还在上升，估计今年全乡弃田弃水面积将达到35000亩，占全乡总面积的65%。现在我们全力以赴做调田转包工作，估计今年至少要撂荒20000亩以上。\n\n 我们这儿的田亩负担在200元/亩。另外还有人头负担100 400元/人不等。两项相加350元/人亩左右。一家五口种地8亩，全年经济负担2500 3000元（不含防汛抗灾、水利等劳动负担）。农民种地亩产1000斤谷子（0.4元/斤），仅仅只能保本（不算劳动负担），80%的农民亏本。农民不论种不种田都必须缴纳人头费、宅基费、自留地费，丧失劳动力的80岁的老爷爷老奶奶和刚刚出生的婴儿也一视同仁交几百元钱的人头负担。由于种田亏本，田无人种，负担只有往人头上加，有的村的人头负担高过500多元/人。我经常碰到老人拉着我的手痛哭流泪盼早死，小孩跪在我面前要上学的悲伤场面。我除了失声痛哭外，无法表达我的心情。痛苦与无奈一切尽在哭泣中。今年的负担还要加，您说这是怎么回事啊！少壮去打工，剩下童与孤，又见负担长，唯望天地哭！\n\n  1995年，约有85%的村有积累，现在有85%的村有亏空，平均每村亏空不少于40万元。90%的村有负债，平均负债60万元以上，月利率20‰。1995年约有70%的乡镇财政有积累，现在90%的乡镇财政有赤字，平均赤字不少于400万元，平均负债不少于800万元，月利率高达15‰。村级负债每年增加10 15万元，乡级负债每年增加150万元左右。农民负担一年比一年重，村级集体亏空一年比一年多，乡镇财政赤字一年比一年大。我们棋盘乡不搞任何建设只交上面的税费，发干部的工资，支付债款利息，收支两品，乡村每年净亏1000万元。这样下去基层组织和政府怎么运转？\n\n  90年棋盘乡吃税费的干部不过120人，现在超过340人，并且这种增长的势头无法得到控制，新上任的领导无法顶住内外压力，不得不滥用权力安排一帮子人吃“皇款”，年年有新官，干部增长何时休？官取于民，民取于土，落在水上，打在泥上，农民怎么受得了！\n\n  “交足国家的，留足集体的，剩下的全是自己的”，联产承包责任制曾让亿万农民欢欣鼓舞。可是现在农民交足国家的，留足集体的，必须贴自己外出“打工”的血泪钱。负担的日益增加，价格的逐年回落，被农民视为生命的土地已成为农民的沉重包袱，联产承包责任制被农民视为套在他们脖子上的枷锁。出生在集镇，就不要人头负担，出生在农村就年年交人头费几百元，这是多么不公平啊！\n\n中央扶持农业的政策，保护农民积极性的政策，很难落到实处。近年来，没有对农民发过贷款，即使有极个别的其月利率在18‰以上（高利贷）。没有按保护价收过定购粮，相反，国家收粮还要农民出钱做仓容。国家不收粮，农民自己消化还要罚款，甚至没收。农民负担年年喊减，实际负担额极个别地方虽没有增加，但农民收入下降了，相对负担却是年年加重的。政策和策略是党的生命，且能如此玩儿戏，几亿农民不相信中央的农村政策，这种后果将是可怕的！\n\n  我在农村工作已有17年，先后担任过四个乡镇的书记，从来没有象现在这样沉重过。我不知道全国的情况，至少我说的情况在湖北省有一定的代表性。现在农民太苦了！农村的工作太难了！农业潜在危机太大了！\n\n现在问题成堆，不改革没有出路。联产承包责任制要完善，农村负担办法要完善，县乡机构要改革，农村基层组织要创新，工作方法方式要创新……。“稳定压倒一切”被一些人片面理解，以为稳定应该压倒发展，稳定应该压倒改革。中国有十亿农民，农民最有创新精神，农村的基层干部最了解农村的实际，很多人也有很高的学历和很强的能力，应给予他们讲台和改革创新的宽松环境。农民和农村的基层干部生活在社会的最底层，很多文化产品把他们贬低得一钱不值，其实他们艰难，甚至忍辱负重地支撑着整个国家和民族。农民用100亩地的纯收入养活着一个国家干部，自己却外出打工谋生。基层干部受尽各种屈辱完成各种税费，自己工资却无着落，拿着“白条”回家过年。如果县以上领导干部都能象王任重同志那样，每年能在乡镇工作两个月，和他们一起研讨问题，探求政策，我想“上有政策，下有对策，有令不行，有禁不止“的现象就不会发生，农村、农民、农业问题决不会是今天这个样子。"
prc_zz.7.a:0 "“农村问题太严重了...”"
