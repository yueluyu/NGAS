prc_zz.10.t:0 "世贸第四届部长级会议通过《中国加入议定书》"
prc_zz.10.d:0 "从申请恢复关贸总协定缔约方地位，到开启漫长而艰辛的入世谈判，我们与各成员方进行了多轮艰苦磋商，终于达成了公平合理的协议。\n\n本日，在多哈举办的世界贸易组织第四届部长级会议上，与会全体成员以协商一致的表决结果正式审议并通过《中国加入世界贸易组织议定书》。此事件标志着我国正式加入世贸组织，成为其第143个成员，同时也标志着我国对外开放与体制建设进入了一个新的阶段。\n\n加入世贸组织，是我国开放和现代化建设的历史必然，也是进一步推进对外开放与建设市场体制的重要契机，是我国对外开放和世界经济全球化进程中具有里程碑意义的大事。国际货币基金组织前总裁克勒盛赞道：“这是一个历史性事件，不仅十分有利于中国和亚洲地区，也十分有利于包括愿意实行开放型国际贸易国家在内的整个国际社会”。\n\n开放带来进步，封闭必然落后。中国将坚定站在历史正确的一边，协同全球一同面对发展路程上的困难，力求同各国一道共同开创人类更加美好的未来。"
prc_zz.10.a:0 "对外开放的新征程！"
prc_zz.10.d_out:0 "从申请恢复关贸总协定缔约方地位，到开启漫长的入世谈判，我们历经十余年曲折磨难，与数十个世界贸易组织成员展开一轮又一轮艰苦磋商。终与各世贸协约国达成公平合理的协议，顺利融入多边贸易体系的规则框架之中。\n\n本日，在多哈举办的世界贸易组织第四届部长级会议上，与会全体成员以协商一致的表决结果，正式审议并通过《中国加入世界贸易组织议定书》。\n\n回望这一抉择，它不仅是我们在经济全球化浪潮中主动亮出的“入场券”，更是改革开放征途上一座不可磨灭的里程碑。\n\n但也必须要清楚，既然面向国际，国内产业便不得不直面国际巨头，那些缺乏核心竞争力的落后产能，注定要在市场中淘汰。我们仍需加强自身企业的硬实力，去面对这些必要的困难。\n\n当然，这一系列大刀阔斧的对外开放与深化改革的举措，不仅是我们向世界递出的“中国名片”，更是我们推进国际化的行动。这股改革的洪流必将为社会主义市场经济注入前所未有的澎湃动能。"

prc_zz.11.t:0 "第十六届中央委员会第三次全体会议"
prc_zz.11.a:0 "蛤蛤蟆蟆"
prc_zz.12.d:0 "今天，党的十六届三中全会召开。\n出席这次全会的有中央委员188人，候补中央委员154人。中央纪律检查委员会常务委员会委员和有关方面负责同志列席会议。\n\n全会由中央政治局主持。中央委员会委员长吴邦国作了重要讲话。\n\n全会听取和讨论了吴邦国受中央政治局委托作的工作报告。会议充分肯定党的十六大以来中央政治局的工作，一致认为，面对复杂复杂的国内外形势，党中央坚持以邓小平理论和“三个代表”重要思想为指导，坚定不移推进改革开放和社会主义现代化建设，保持了经济持续快速增长和社会总体稳定。\n\n全会指出，改革开放是决定当代中国命运的关键抉择。面对经济全球化深入发展和市场经济体制不断完善的新形势，必须继续坚持以经济建设为中心，坚持发展是硬道理，进一步释放生产力，增强国家综合实力和国际竞争能力。强调了第三代中央领导集体在改革开放和现代化建设事业中创造的宝贵经验，是党和国家继续前进的重要财富。\n\n全会一致认为，以吴邦国同志为核心的中央领导集体，成功维护了党中央的团结统一，确保了改革开放和社会主义现代化建设事业沿着正确方向继续前进。"
prc_zz.13.d:0 "今天，党的十六届三中全会召开。\n出席这次全会的有中央委员188人，候补中央委员154人。中央纪律检查委员会常务委员会委员和有关方面负责同志列席会议。\n\n全会由中央政治局主持。中共中央总书记胡锦涛作了重要讲话。\n\n全会听取和讨论了胡锦涛受中央政治局委托作的工作报告。会议充分肯定党的十六大以来中央政治局的工作，一致认为，面对复杂多变的国内外形势，党中央坚持以邓小平理论和“三个代表”重要思想为指导，团结带领全国各族人民推进改革开放和社会主义现代化建设，保持了经济持续增长和社会总体稳定。\n\n全会指出，经过广泛讨论和认真审议，中央委员会进一步统一了思想，明确了新世纪新阶段党和国家发展的战略方向。强调了必须坚持以人为本，树立全面、协调、可持续的发展观，正确处理改革、发展和稳定的关系，推动社会主义市场经济不断完善，促进经济社会全面进步。\n\n以胡锦涛同志为总书记的党中央，在新的历史条件下继承和发展了党的基本路线，体现了全党对于实现国家长治久安和中华民族伟大复兴的共同意志。"
prc_zz.13.a:0 "属于新一代人的时代已经到来。"
