 PRC_gqtp:0 "§R共青团派§!\n\n§W————————————————————§!\n\n[gong_qing_tuan_loc_1]"
 gong_qing_tuan_loc:0 "政治点数获取：[?tuan_pai_pp_gain||%2+=]\n政治顾问花费：[?tuan_pai_advisor_cost|%2-=]"
 gong_qing_tuan_1:0 "团派，全称§Y中国共产主义青年团派系§!。与其他依靠地方关系或行业背景形成的政治集团不同，团派的根基来源于中国共产党的干部培养体系。长期以来，共青团承担着培养青年干部、输送后备人才的重要职能，因此也被视为党内最重要的人才储备库之一。\n\n八十年代，在§O胡耀邦§!的推动下，大批年轻干部进入各级领导岗位，共青团系统也迎来了自己的黄金时期。虽然胡耀邦最终因政治风波离开权力中心，但他留下的干部网络并未随之消失。相反，这些年轻干部继续活跃于地方与中央各级机构之中，等待着属于他们的时代。\n\n随着干部年轻化政策的推进，另一位出身共青团系统的干部逐渐进入中央视野——§O胡锦涛§!。这位性格谨慎、行事低调的技术官僚被视为共和国未来的接班人之一。在中央的支持下，他先后主政地方并进入最高领导层，而一批与其拥有相似经历的共青团干部也开始在全国各地崭露头角。经过多年的发展，一个以胡锦涛为核心，以地方青年干部和技术官僚为骨干的政治集团正在逐渐成型。\n\n与强调经济增长相比，团派更关注社会公平、区域协调发展以及基层治理问题。他们大多拥有地方工作经历，对农村、欠发达地区以及社会矛盾有着更深刻的认识。然而，由于资历尚浅且缺乏足够的中央根基，他们仍然难以与经营多年的江派正面抗衡。\n\n尽管如此，没有人会怀疑团派的未来。随着老一代领导人逐渐退出历史舞台，共青团系统培养出的新一代干部终将接过共和国的接力棒。对于他们而言，问题从来不是能否进入权力中心，而是何时进入，以及进入之后又将把国家带向何方。\n\n§R不过现在，还轮不到他们发号施令。§!"

 gong_qing_tuan_2:0 "团派，全称§Y中国共产主义青年团派系§!。与其他依靠地方关系或行业背景形成的政治集团不同，团派的根基来源于中国共产党的干部培养体系。长期以来，共青团承担着培养青年干部、输送后备人才的重要职能，因此也被视为党内最重要的人才储备库之一。\n\n八十年代，在§O胡耀邦§!的推动下，大批年轻干部进入各级领导岗位，共青团系统也迎来了自己的黄金时期。虽然胡耀邦最终离开了权力中心，但他留下的人才网络并未因此消散。大量拥有共青团背景的干部继续活跃于地方和中央各级机构之中，并逐渐成长为共和国政治舞台上的重要力量。\n\n随着干部年轻化政策的推进，另一位出身共青团系统的干部逐渐进入中央视野——§O胡锦涛§!。这位以谨慎和务实著称的技术官僚，在长期地方历练后进入中央领导层，并最终在十六大后成为党中央的核心领导人。与此同时，一批拥有共青团背景的干部也开始陆续进入省部级岗位，形成了一个以青年干部和技术官僚为主体的新兴政治集团。\n\n强调经济增长相比，团派更加重视社会公平、区域协调发展以及基层治理问题。他们中的许多人长期在内陆省份和基层地区工作，对于农村发展、社会保障以及贫富差距等问题有着更加深刻的认识。在他们看来，经济增长固然重要，但增长本身并不能解决一切挑战。\n\n然而，成为领导人并不意味着掌握全部权力。尽管胡锦涛已经走上权力舞台的中央，但共青团派在中央部委、组织系统以及地方关键岗位上的影响力仍然相对有限。团派依旧需要时间去积累自己的政治资本，并将自身影响力扩展到党内。虽然，他们已经迈入权力中心，却还没有真正成为权力中心。\n\n§Y接过旗帜只是开始，如何让所有人跟随旗帜前进，才是真正的考验。§!"


