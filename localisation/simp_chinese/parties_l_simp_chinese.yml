 nasserism:0 "纳赛尔主义"
 nasserism_desc:0 "§H纳赛尔主义§!\n\n\n\n\n\n\n£img_nasser \n\n\n\n\n\n\n纳赛尔主义是一种泛阿拉伯意识形态，大体涵盖了社会主义、共和主义和民族主义意识形态。这一思想流派源自20世纪中叶贾迈勒·阿卜杜勒·纳赛尔及其阿拉伯世界领袖的理想、价值观、目标和实践。在融合了阿拉伯世界伊斯兰与基督教遗产的同时，纳赛尔主义在本质上依旧保持着世俗的色彩。其核心理念是福利主义和进步主义，主张为贫困群体提供免费医疗与教育，致力于消除文盲。作为一场反殖民主义的运动，它呼吁结束以欧洲为代表的西方帝国主义的干预与影响，倡导促进第三世界的团结，支持国际非结盟，鼓励现代化与工业化进程。"
 AST_social_democracy_party:0 "工党"
 AST_social_democracy_party_long:0 "澳大利亚工党(Australian Labor Party)"
 PER_socialism_party_n1:0 "伊朗全国抵抗委员会"
 PER_socialism_party_n1_long:0 "伊朗全国抵抗委员会(National Council of Resistance of Iran)"
 ho_chi_minh_thought:0 "胡志明思想"
 ho_chi_minh_thought_desc:0 "§H胡志明思想§!\n\n\n\n\n\n\n£img_ho_chi_minh_thought \n\n\n\n\n\n\n胡志明思想是由胡志明在其革命经历中提出、形成、产生、由越南共产党总结、体系化、实践、发展的一系列将马克思列宁主义与越南特殊情况相结合的观点与理念。这一思想体系包罗万千，从解决越南革命问题的基本视角，包括民族解放、阶级解放与人类解放的观念；到民族独立与社会主义的紧密结合，以及民族力量与世界局势的结合；再到人民的力量以及伟大的民族团结。"
 left_wing_nationalism:0 "左翼民族主义"
 left_wing_nationalism_desc:0 "§H左翼民族主义§!\n\n\n\n\n\n\n£img_socialism \n\n\n\n\n\n\n左翼民族主义，或称为民族主义左派，是一种基于民族自决、人民主权以及诸如社会平等的左翼思想的民族主义形式。左翼民族主义同样包含反帝国主义与民族解放运动。"
 bolivarianism:0 "玻利瓦尔主义"
 bolivarianism_desc:0 "§H玻利瓦尔主义§!\n\n\n\n\n\n\n£img_bolivarism \n\n\n\n\n\n\n玻利瓦尔主义是以19世纪委内瑞拉将军以及将其从西班牙君主制中夺回的解放者、南美独立运动领袖西蒙·玻利瓦尔命名的泛西班牙裔、社会主义与民族主义-爱国主义理想的混合体。"
 pseudo_communism:0 "伪共产主义"
 pseudo_communism_desc:0 "§H伪共产主义§!\n\n\n\n\n\n\n£img_fake_communism \n\n\n\n\n\n\n伪共产主义是一种共产主义名存实亡的状态，国家表面上由共产党领导，宣扬共产主义理念，实则只是一块遮羞布。在这层掩饰之下，经济体系实则被垄断集团操控，资本主义已被制度化，其阴影无处不在，腐败根深蒂固，权力仅在少数精英手中流转。政权虽以社会主义的华丽辞藻为幌子，维系其控制与合法性，但实质上却是一种充满缺陷的资本主义，唯有少数特权阶层得以从中渔利。\n\n意识形态已成空谈，国家主义已成过往云烟，政党仅为私利而执政。"
 RSF_socialism_party:0 "俄社盟"
 RSF_socialism_long:0 "俄罗斯社会主义者联盟(Union of Russian Socialists)"
 chinese_socialism:0 "中国特色社会主义"
 chinese_socialism_desc:0 "§H中国特色社会主义§!\n\n\n\n\n\n\n£GFX_img_chinese_socialism \n\n\n\n\n\n\n中国特色社会主义指中国共产党在70年代末期以来所秉持的基本意识形态，其淡化阶级关系，专注于经济建设、国家现代化和民族地位复兴的特征使其有别于毛泽东思想，到千禧年前后已具备完整的理论体系。这一政治模式将快速发展的市场经济基础与更加传统的一党制社会主义政治上层建筑相结合，在客观上极大地促进了中国的经济发展。"
 social_liberalism:0 "社会自由主义"
 social_liberalism_desc:0 "§H社会自由主义§!\n\n\n\n\n\n\n£img_liberalism \n\n\n\n\n\n\n社会自由主义源自古典自由主义，但随着19世纪工业资本主义带来的社会贫富分化而发展。该意识形态倡导个人自由和社会福利，支持混合经济体系，以促进机会平等，并通过政府干预来解决社会不平等问题。社会自由主义在缩小贫富差距的同时，维护公民自由，推动一种平衡市场驱动增长与全体公民保护的体系。"
 national_liberalism:0 "民族自由主义"
 national_liberalism_desc:0 "§H民族自由主义§!\n\n\n\n\n\n\n£img_liberalism \n\n\n\n\n\n\n民族自由主义强调自由市场经济与国家主权强有力捍卫之间的合流。支持者认为，虽然应鼓励个人自由和私人企业，但国家有责任保护民族文化和经济利益，抵御外来影响。这一意识形态将经济自由主义与民族主义融会贯通，旨在促进个人自由的同时建立起一个强大、独立的国家。"
 liberal_conservatism:0 "自由保守主义"
 liberal_conservatism_desc:0 "§H自由保守主义§!\n\n\n\n\n\n\n£img_conservatism \n\n\n\n\n\n\n自由保守主义提倡个人自由与有限的政府经济干预，同时恪守文化传统与社会稳定。其主张渐进、温和的改革，而非激进的变革，强调个人责任与社会团结。该意识形态认为，传统为社会奠定了稳固之基，而经济自由则能确保个人与国家的发展。"
 national_conservatism:0 "民族保守主义"
 national_conservatism_desc:0 "§H民族保守主义§!\n\n\n\n\n\n\n£img_national_conservatism \n\n\n\n\n\n\n民族保守主义根植于对国家身份与文化认同的保护，倡导主权与经济保护主义。该意识形态强调强大集中的国家，致力于削弱外来影响并维护社会的统一，突显社会保守主义与家庭价值。\n"
 national_democracy:0 "民族民主主义"
 national_democracy_desc:0 "§H民族民主主义§!\n\n\n\n\n\n\n£img_authdem \n\n\n\n\n\n\n民族民主制是一种存在选举等民主实践的政体，但权力仍然集中于统治精英或主导政党之中。尽管公众参与有所体现，但为了确保稳定与秩序，决策过程受到严格控制，常常以牺牲个人自由和政治多元性为代价。"
