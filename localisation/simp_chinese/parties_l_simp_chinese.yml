 paternal_autocracy_desc:0 "专制政体"
 fascism_desc:0 "民族主义政体"
 anarchism_desc:0 "无政府主义政体"
 marxism:0 "马克思主义"
 marxism_desc:0 "§H马克思主义§!\n\n\n\n\n\n\n£img_communism \n\n\n\n\n\n\n马克思主义涵盖从经济学到历史观的辽阔领域，其根本上力图将卡尔·马克思的理论付诸政治实践。主张阶级斗争以及过渡至生产资料公有制社会是这种意识形态的主要特征。"
 marxism_leninism:0 "马克思-列宁主义"
 marxism_leninism_desc:0 "§H马克思-列宁主义§!\n\n\n\n\n\n\n£img_communism \n\n\n\n\n\n\n马克思-列宁主义是一种基于马克思主义的意识形态流派，其旨在以党领导革命颠覆资本主义社会的方式建立社会主义国家。而在取得政权后，这种意识形态下的政党会通过内部讨论决策的方式执政。"
 stalinism:0 "斯大林主义"
 stalinism_desc:1 "§H斯大林主义§!\n\n\n\n\n\n\n£img_stalinism \n\n\n\n\n\n\n作为对马克思列宁主义在政治上的继承和发展，斯大林主义重视快速工业化与集体化，并认为只有强而有力的社会主义政府才能彻底肃清反革命分子。"
 anti_revisionism:0 "反修正主义"
 anti_revisionism_desc:0 "§H反修正主义§!\n\n\n\n\n\n\n£img_communism \n\n\n\n\n\n\n反修正主义是一种为反击众多自诩马克思主义继承人的意识形态而产生的流派，提倡保持原始革命理论的核心要素。其主要反对将资本主义经济元素引入社会主义国家，这种意识形态很大程度上通过“什么不是什么”而非“什么是什么”来定义。"
 anarchist_communism:0 "无政府共产主义"
 anarchist_communism_desc:0 "§H无政府共产主义§!\n\n\n\n\n\n\n£img_anarcom \n\n\n\n\n\n\n无政府共产主义是一种将共产主义理想视为无国家社会的意识形态，其主张跳过具备过渡性质的社会主义国家，倾向于直接建立互帮互助的社会。"
 juche:0 "主体思想"
 juche_desc:0 "§H主体思想§!\n\n\n\n\n\n\n£img_juche \n\n\n\n\n\n\n主体思想又称为金日成思想，是一种视劳动群众为革命动力的信仰体制。主体思想建立在自力更生的原则和个人有能力逆天改命的理念之上。是一种以人为本，倡导坚持群众独立自主和自力更生的政治思想。"
 maoism:0 "毛主义"
 maoism_desc:0 "§H毛主义§!\n\n\n\n\n\n\n£img_maoism \n\n\n\n\n\n\n与毛泽东思想不同，毛主义以新的革命形式推进了传统的马克思列宁主义，例如严厉的反城市和反地主议程，以及针对所谓“反动文化”的持续文化战争。它与毛泽东思想相对立，拒绝了毛泽东后期作品的某些方面。在革命期间，各种运动严重依赖农民的支持来根除封建结构，同时实行游击战术。这种方法旨在建立一个有阶级觉悟的无产阶级，并重塑整个社会。"
 market_socialism:0 "市场社会主义"
 market_socialism_desc:0 "§H市场社会主义§!\n\n\n\n\n\n\n£img_refcom \n\n\n\n\n\n\n市场社会主义是一种经济制度，其囊括了市场经济框架内生产资料的公有制、合作制或社会所有制，或是包含工人自营、国有和私有企业的混合所有制。市场社会主义一词有时被用来指苏联式计划经济国家试图在其经济体系中引入市场要素的任何尝试。"
 revolutionary_socialism:0 "社会主义"
 revolutionary_socialism_desc:0 "§H社会主义§!\n\n\n\n\n\n\n£img_socialism \n\n\n\n\n\n\n社会主义并无明确定义。它涵盖了从革命性政治运动和工人政党（旨在迅速暴力推翻资本主义）到接受议会制度与民主的改革派思潮等一系列政治倾向。\n\n然而无论倾向如何，一个不变的真理始终存在：它强调平等、正义和团结等基本价值观，并凸显社会运动与批判性社会理论之间的密切联系。其终极目标是建立一个以社会正义为导向的和谐社会秩序。"
 democratic_socialism:0 "民主社会主义"
 democratic_socialism_desc:0 "§H民主社会主义§!\n\n\n\n\n\n\n£img_demsoc \n\n\n\n\n\n\n民主社会主义是一种左翼政治哲学，主张政治民主与某种形式的社会所有制经济，特别强调在市场社会主义经济或分散式计划社会主义经济中实现经济民主、职场民主及工人自治。\n\n民主社会主义者主张资本主义本质上与自由、平等、团结的价值观相悖，唯有通过建立社会主义社会才能实现这些理想。该思想由20世纪反对苏联及其他国家倒退回一党专政的社会主义者所推广。"
 baathist_socialism:0 "复兴社会主义"
 baathist_socialism_desc:0 "§H复兴社会主义§!\n\n\n\n\n\n\n£img_baatb \n\n\n\n\n\n\n复兴社会主义是一种最早由米歇尔·阿弗拉克和萨拉赫·丁·比塔尔基于阿拉伯统一和建立一个从大西洋沿岸到阿拉伯湾的单一阿拉伯国家的思想所提出的政治意识形态。复兴主义是一种世俗意识形态，旨在促进阿拉伯世界的经济、社会和政治进步。信仰复兴主义的复兴党曾在叙利亚和伊拉克等多个阿拉伯国家执政。"
 social_democracy_sub:0 "社会民主主义"
 social_democracy_sub_desc:0 "§H社会民主主义§!\n\n\n\n\n\n\n£img_socdem \n\n\n\n\n\n\n社会民主主义力图依靠改革来建立一个平等的社会主义国家，其目标是废除或者削弱资本主义从民众手中摄取的权力。"
 social_patriotism:0 "社会爱国主义"
 social_patriotism_desc:0 "§H社会爱国主义§!\n\n\n\n\n\n\n£img_socpat \n\n\n\n\n\n\n社会爱国主义将社会福利与带有强烈爱国主义和民族主义倾向的孤立主义相结合。它的目标是推动建立牢固的社会安全网、工人保障体系以及政府干预以施行惠及普通市民的政策。然而，这种对于社会福利的重视同时也混杂了民族沙文主义成分，通常表现为将国家利益置于跨国联盟或组织之上。社会爱国主义将民粹主义经济政策与爱国主义宣传口径融为一体，推动着本地与海外事务中的孤立主义行为。该思想的支持者认为满足工人阶级的需求与维护民族独立、保护边境并且对外展示某种围绕利己主义而非国际合作体现的强烈民族自豪感等事项是不可分割的。"
 liberalism_sub:0 "自由党"
 liberalism_sub_desc:0 "§H自由主义§!\n\n\n\n\n\n\n£img_liberalism \n\n\n\n\n\n\n在尊重个人自由的悠久哲学传统下，自由主义将捍卫这些权利视为国家的首要职能。"
 conservatism:0 "保守主义"
 conservatism_desc:0 "§H保守主义§!\n\n\n\n\n\n\n£img_conservatism \n\n\n\n\n\n\n保守主义认为快速变革对社会可能有害，因而倾向于维护传统或是开展较温和的改革，有时甚至提倡复古的道德价值观。"
 despotism:0 "威权民主主义"
 despotism_desc:0 "§H威权民主主义§!\n\n\n\n\n\n\n£img_authdem \n\n\n\n\n\n\n威权民主主义也被称为缺陷型民主用以描述某些缺乏达到真正民主的部分必要机关的政权。在这些政权治下，选举依旧会存在，但它们并不会是完全公正与自由的，即使选举结果并没有通过某些暗箱操作提前内定。常见的情况是存在某一个政党，抑或是某一政治人物掌控了大部分权力从而能够操纵各民主机关，如宪法法院，从而得以持续掌权。这些政权不应当与专制政府相混淆，尽管这两者并无本质差别。"
 oligarchism:0 "寡头政治"
 oligarchism_desc:0 "§H寡头政治§!\n\n\n\n\n\n\n£img_oligarchism \n\n\n\n\n\n\n寡头政治是一种小部分人拥有绝对权力的政府形式。"
 moderatism:1 "温和主义"
 moderatism_desc:1 "§H温和主义§!\n\n\n\n\n\n\n£img_conservatism \n\n\n\n\n\n\n温和主义是一种在施政上采取温和姿态或手段来避免极左或极右的政府形式。"
 centrism:1 "中间路线"
 centrism_desc:1 "§H中间路线§!\n\n\n\n\n\n\n£img_conservatism \n\n\n\n\n\n\n中间路线是一种试图通过符合常识的治理方式解决问题的政府形态，其施政力求在考虑风险和承载力的情况下，妥善解决当前和未来的需求，从而获取公众信任，进而维护共同利益。"
 collapsed_state:0 "国家崩溃"
 collapsed_state_desc:0 "§H国家崩溃§!\n\n\n\n\n\n\n£img_collapsed \n\n\n\n\n\n\n国家崩溃是指政府在国家治理方面彻底失败，整个国家陷入无法无天和失控的无政府状态。"
 military_junta_auth:0 "军政府"
 military_junta_auth_desc:0 "§H军政府§!\n\n\n\n\n\n\n£img_junta \n\n\n\n\n\n\n在这种体制下，一国的军队接管了国家领导权，并对所有重要的国家职能和决策机构施加影响。"
 monarchism:0 "君主制"
 monarchism_desc:0 "§H君主制§!\n\n\n\n\n\n\n£img_monarchism \n\n\n\n\n\n\n绝对君主制贯彻着一个观点，那就是最好的政府模式是由统治者通过世袭继承终身权力实现的。这类系统看似消除了权力斗争并确保了权力的有序过渡，从而提供某种稳定性与连续性。这些君主通常还拥有一小群主要由辅佐君主的贵族组成的顾问。尽管存在些许优势，君主制仍会导致权利滥用以及寻找合适继承人的过程中的种种复杂情况。"
 paternal_autocracy_sub:0 "家长制独裁"
 paternal_autocracy_sub_desc:0 "§H家长制独裁§!\n\n\n\n\n\n\n£img_patau \n\n\n\n\n\n\n家长制独裁是一种全部国家权力被单个同时被视为国家元首并在社会上以父亲形象示人的至高领袖所垄断的治理体系。在公民自由遭受严重限制的同时，这位专制者声称为民众提供仁慈的指导与生活资料的供给来换取他们彻底的服从与忠诚。以公民必须对这位通过神授或天赋权力而非制度制衡或民主程序来领导国家的，慈爱但极度威权主义的父权制领导人表示服从为由，反对意见通常会被压制。"
 real_despotism:0 "专制政府"
 real_despotism_desc:0 "§H专制政府§!\n\n\n\n\n\n\n£img_patau \n\n\n\n\n\n\n专制政府通常被称为独裁统治，代指单一群体或领导人对某一片领土的，受到很少或没有限制的控制。此类政府一般会选择压制政治异见、媒体监督与个人自由。专制统治达成的方式通常包括军事独裁，一党制政府，君主制或个人独裁。这些政权经常需要依赖宣传工具与镇压行动来维持统治。由于对人民意愿的忽视，专制统治的持续时长一般都是有限的。"
 military_junta:0 "军政府"
 military_junta_desc:0 "§H军政府§!\n\n\n\n\n\n\n£img_junta \n\n\n\n\n\n\n在这种体制下，一国的军队接管了国家领导权，并对所有重要的国家职能和决策机构施加影响。"
 neo_nazism:0 "新纳粹主义"
 neo_nazism_desc:0 "§H新纳粹主义§!\n\n\n\n\n\n\n£img_nationalism \n\n\n\n\n\n\n国家社会主义植根于极端民族主义，并且受到了日耳曼种族至上理念的推动。其积极推行侵略性扩张政策并主张建立极权国家，在此基础上，人民都将被团结在拥有绝对权力的领袖——元首的领导下。"
 neo_fascism:0 "新法西斯主义"
 neo_fascism_desc:0 "§H新法西斯主义§!\n\n\n\n\n\n\n£img_nationalism \n\n\n\n\n\n\n国家社会主义植根于极端民族主义，并且受到了日耳曼种族至上理念的推动。其积极推行侵略性扩张政策并主张建立极权国家，在此基础上，人民都将被团结在拥有绝对权力的领袖——元首的领导下。"
 fascism_ideology:0 "民族主义"
 fascism_ideology_desc:0 "§H民族主义§!\n\n\n\n\n\n\n£img_nationalism \n\n\n\n\n\n\n民族主义是一种优先考虑单一民族集体利益的意识形态。它尤其旨在捍卫该民族的主权、文化、语言与遗产，通常是针对移民或某个周边国家。因此，民族主义运动一般会以牺牲国际合作或国内少数民族的权利作为代价。"
 nazbolism:0 "民族布尔什维主义"
 nazbolism_desc:0 "§H民族布尔什维主义§!\n\n\n\n\n\n\n£img_nazbol \n\n\n\n\n\n\n民族布尔什维克主义将极右翼极端主义与革命和专制的共产主义思想相结合。这包括有计划的经济结构和以工人为导向的社会政策，同时保持种族限制。它出现在 20 世纪初的俄罗斯，从那时起在欧洲的极右翼团体中越来越受欢迎。民族布尔什维克将民族主义威权主义与反资本主义和反自由主义情绪混合在一起。这种意识形态往往提倡强大的国家、传统价值观和对全球化的反对。"
 nationalist_military_junta:0 "民族主义军政府"
 nationalist_military_junta_desc:0 "§H民族主义军政府§!\n\n\n\n\n\n\n£img_junta \n\n\n\n\n\n\n在这种体制下，一国的军队接管了国家领导权，并对所有重要的国家职能和决策机构施加影响。然而，这种政府形式与一般的军事统治不同的是，其非常强调偏袒国家中某一民族更甚于其他民族。"
 ultranationalism:0 "极端民族主义"
 ultranationalism_desc:0 "§H极端民族主义§!\n\n\n\n\n\n\n£img_ultranationalism  \n\n\n\n\n\n\n极端民族主义将民族主义运用到极致。它包含激进的扩张主义，种族主义政策以及对民族至上的信仰。极端民族主义情绪可以从那些以征服被声称应得的土地或控制被声称应统一的人民为目标的威权或军国主义政策中发源。这种思潮通常会拒斥国际主义并尝试在达成目标后立刻采取孤立主义态度。"
 eurasianism:0 "欧亚主义"
 eurasianism_desc:0 "§H欧亚主义§!\n\n\n\n\n\n\n£img_eurasianism \n\n\n\n\n\n\n欧亚主义关注欧亚大陆的独特身份认同与战略位置的重要性。它提倡建立由俄罗斯所主导的联盟或者单个的欧亚国家以对抗西方影响力。欧亚主义者推崇文化保守主义、传统主义与地缘政治霸权。"
 baathist_nationalism:0 "复兴民族主义"
 baathist_nationalism_desc:0 "§H复兴民族主义§!\n\n\n\n\n\n\n£img_baatb \n\n\n\n\n\n\n复兴民族主义是一种最早由米歇尔·阿弗拉克和萨拉赫·丁·比塔尔基于阿拉伯统一和建立一个从大西洋沿岸到阿拉伯湾的单一阿拉伯国家的思想所提出的政治意识形态。复兴主义是一种世俗意识形态，旨在促进阿拉伯世界的经济、社会和政治进步。信仰复兴主义的复兴党曾在叙利亚和伊拉克等多个阿拉伯国家执政。"
 anarchism_sub:0 "无政府主义"
 anarchism_sub_desc:0 "§H无政府主义§!\n\n\n\n\n\n\n£img_anarchism \n\n\n\n\n\n\n无政府主义对威权本身极为排斥，其主张使社会分解为自我管理的自治集体，而非形成统一的中央集权国家。"
 DYR_ARABIAN_LONG:0 "阿拉伯社会主义联盟(Arab Socialist Union)"
 DYR_ARABIAN_SHORT:0 "阿拉伯社会主义联盟"
 SOV_communism_party:0 "苏联共产党"
 SOV_communism_party_russian:0 "苏联共产党"
 SOV_communism_party_long:0 "苏联共产党(Kommunisticheskaya Partiya Sovetskogo Soyuza)"
 SOV_reformed_communism_party:0 "苏联共产党 - 改革派"
 SOV_reformed_communism_party_long:0 "苏联共产党 - 改革派(Kommunisticheskaya Partiya Sovetskogo Soyuza - Reformistskoye Krylo)"
 SOV_socialism_party:0 "苏联共产党 - 改革派"
