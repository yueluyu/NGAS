 SIN_liberalism_party_desc:0 "新加坡民主党"
 vanguard_stratocracy:0 "先锋军政体制"
 vanguard_stratocracy_desc:0 "§H先锋军政体制§!\n\n\n\n\n\n\n£img_vanguard_stratocracy \n\n\n\n\n\n\n这是一种融合军事化统治与马克思列宁主义思想的混合体制，由自诩为革命先锋队的国家领导集团主导，其成员大多来自军事精英阶层。武装力量不仅负责推行集体化、阶级斗争与对所谓反革命威胁的持续动员，还兼任国家的政治与经济规划者。\n\n战时纪律被用作压制异见的借口，社会结构被重组为一种等级分明、军营式的体制，公民资格建立在对军事国家的服役基础之上。此体制将平等主义的共产主义修辞与军政府的刚性等级制度相结合，并将所谓的“科学的士兵—社会主义”视为历史唯物主义的最高体现。"
 islamic_socialism:0 "伊斯兰马克思主义"
 islamic_socialism_desc:0 "§H$伊斯兰马克思主义$§!\n\n\n\n\n\n\n£img_islamic_socialism \n\n\n\n\n\n\n许多人质疑传统伊斯兰教与激进的马克思主义思想有何关联，但事实上，社会主义与共产主义的若干核心理念，自始至终便存在于伊斯兰教义与先知穆罕默德的教导之中。例如，天课制度本质上就是实现社会平等的一种方式。\n\n伊斯兰马克思主义诞生于长期遭受西方帝国主义压迫的土地，其倡导者力图在保留伊斯兰宗教传统与信仰的同时，融合社会政策与反帝理想，以此构建民族认同，并制定治国方略。然而，围绕社会主义与共产主义理念如何与伊斯兰教法相结合，内部存在诸多分歧与争议，因而形成了众多不同的支派与思想流派。"
 new_labour_sub:0 "新工党"
 new_labour_sub_desc:0 "§H新工党§!\n\n\n\n\n\n\n£img_newlabour \n\n\n\n\n\n\n作为社会民主主义的一种形式，新工党试图提供资本主义和社会主义之间的一种综合体，强调社会正义和利用市场实现机会平等的重要性。"
 blairism_sub:0 "布莱尔主义"
 blairism_sub_desc:0 "§H布莱尔主义§!\n\n\n\n\n\n\n£img_blarism \n\n\n\n\n\n\n布莱尔主义指与托尼·布莱尔有关的政治意识形态，它融合了社会民主的元素，并着重强调新自由主义经济学。虽然布莱尔主义在某种程度上保留了对社会正义的承诺，但它更倾向于市场驱动的政策、私有化和有限的政府干预，将自己定位为一种现代化的、“商业友好型 ”的左翼中间政治。"
 gaullism:0 "戴高乐主义"
 gaullism_desc:0 "§H戴高乐主义§!\n\n\n\n\n\n\n£img_gaullism \n\n\n\n\n\n\n戴高乐主义，这一极具法国特色的政治现象，可被浓缩为四个字：法国例外。它诞生于二战结束时那个满目疮痍、战败屈辱的法国，由其精神象征戴高乐将军亲自倡导。这一思想体系的核心在于：法国绝不容许再度在国际舞台上蒙羞。即使置身军事联盟或经济共同体之中，法国也绝不接受对任何国家的从属地位。\n\n戴高乐主义充满矛盾与张力，它在维护法国民族认同的前提下，灵活吸纳左翼与右翼的要素。国家在这一理念下被视为人民的先锋，肩负起捍卫法国人民免受内外动荡侵扰的责任。对外，它坚持法国主权与国格不可动摇；对内，它遏制极端意识形态撕裂国家，保障全民福祉。因此，无论极左或极右，那些试图肢解法国、将其重塑为私人理想蓝图的人，都与戴高乐主义格格不入。\n\n§2那是一条从伦敦出发，§!§W穿越比尔哈基姆战线，途经阿尔及尔，§!§R最终汇聚为希望之光的道路。§!"
 christian_democratic:0 "基督教民主主义"
 christian_democratic_desc:0 "§H基督教民主主义§!\n\n\n\n\n\n\n£img_christian_democratic \n\n\n\n\n\n\n基督教民主主义是一种将基督教原则，尤其是天主教社会教义，与民主价值相结合的政治理念。它于19世纪的欧洲兴起，作为对资本主义过度发展、社会主义崛起以及世俗自由主义扩张的回应。"
 social_conservatism:0 "社会保守主义"
 social_conservatism_desc:0 "§H社会保守主义§!\n\n\n\n\n\n\n£img_social_conservatism \n\n\n\n\n\n\n社会保守主义是一种强调维护传统价值观、制度与社会规范的政治与文化意识形态，通常聚焦于道德、家庭、宗教与文化认同等议题。\n"
 PER_shia_islamism_desc:0 "§H沙里亚民主\n£texticon_sub_under  伊斯兰共和主义§!\n\n\n\n\n\n\n£img_islamic_republicanism \n\n\n\n\n\n\n尽管采纳了部分民主机制或其他现代治理元素，如政党、议会等，伊斯兰共和国的核心理念依然植根于伊斯兰治理思想，尤其是“法基赫监护制”。这一概念源自什叶派伊玛目主义与教士传统，其治理理念与最终目标是要在伊斯兰世界重建“伊斯兰的真正道路”，并为什叶派第十二伊玛目穆罕默德·迈赫迪的“再临”做好准备。\n\n这一目标唯有在“法基赫的监护”（即最高领袖）的领导下才能实现。最高领袖由伊朗伊斯兰共和国的专家会议选出，该会议由经过全民选举产生的宗教学者组成，负责监督与选举最高领袖，以实现伊斯兰革命的理想。尽管上述构成了“法基赫监护制”的基本轮廓，伊斯兰共和国内部仍存在诸多政治派系，尽管理念各异，却都自称忠于伊斯兰共和主义与伊斯兰革命。这也显示出，伊斯兰共和主义在政策层面尚未形成严格统一的定义。在伊朗，诸如伊斯兰社会主义者、伊斯兰社会民主派、新自由主义者，甚至强硬的伊斯兰右翼，都自认为是“法基赫监护制”的追随者。这种分歧与派系林立，显然反映出伊斯兰共和国当前的政治高度极化。"
 VAT_real_despotism_desc:0 "§H教皇制§!\n\n\n\n\n\n\n£img_papacy \n\n\n\n\n\n\n教皇制是一种天主教会内部的教会治理体系，由作为罗马主教和精神领袖的教皇担任最高权威。该制度植根于使徒继承，具有严格的等级结构，由主教与神职人员组成。教皇作为核心人物，兼具宗教与行政权力，其决策以教义与传统为指导，决定教会的教义方向与政策走向。这一制度体现出高度集中的权力结构，旨在维护教义的一致性，并为全球天主教群体提供精神引领。"
 IRQ_neo_nazism_desc:0 "§H$baathist_nationalism$\n£texticon_sub_under 萨达姆主义§!\n\n\n\n\n\n\n£img_saddamism \n\n\n\n\n\n\n萨达姆主义是一种复兴主义的分支政治意识形态，融合了复兴思想、萨达姆·侯赛因的个人信仰以及威权主义特征。其核心在于强烈的反西方立场与亲萨达姆取向，强调对萨达姆个人的崇拜，并推动伊拉克从泛阿拉伯民族主义逐步转向伊拉克本位的民族主义。萨达姆主义被视为一种区别于传统复兴主义的替代路线，其重点在于强化对萨达姆的忠诚，同时清除对其他派系的支持。该思想主张国家军事化，持续发展伊拉克军力，视军队为国家权力结构中的最高支柱，这也或许暗示了萨达姆对阿拉伯世界主导地位的潜在野心。"
