 PRC_democratic_party:0 "中国民主同盟/民主促进会"
 PRC_democratic_party_long:0 "中国民主同盟/民主促进会(CADL/CAPD)§F\n--------------\n1945年抗战结束后国民政府宣布改组宪政，诸多政党如雨后春笋一般冒出。而在国民政府覆灭后。其原有体系内的一部分政党选择了同中共合作。形成了八大民主友党格局。不过由于中共对军队及行政体系的牢牢掌握，所谓民主党派所能做的事情实在有限§!\n"
 PRC_communism_party:0 "中国共产党"
 PRC_communism_party_long:0 "中国共产党(the Communist Party of China)§F\n--------------\n1976年毛泽东去世，在他死后四人帮也随之遭粉碎。自那之后毛派干部及其理论支持者便遭到大规模清洗。同时由于文化大革命及大跃进等错误政策的惨痛回忆仍历历在目,致使新一代共产党人及群众只有很少仍愿意继续为其理论为奋斗。不过，伴随着90年代市场经济高速发展暴露出的大量弊端为世人所见，以及80年代末改革派共产党人的覆灭，其理论再次死灰复燃，再次为一部分人所提起§!\n"
 PRC_reformed_communism_party:0 "中国共产党"
 PRC_reformed_communism_party_long:0 "中国共产党(the Communist Party of China)§F\n--------------\n中国共产党是目前世界上组织最庞大的政党，拥有超8000万党员，其组织严密性与控制力也无与伦比。自1949年中华人民共和国成立以来中国共产党便一直是中国的唯一执政党，通过由党领导的人民解放军与人民政府，其牢牢掌握着中国的一切权力，若要推翻他，恐怕需要一场世界末日级别的政治经济灾难方可§!\n"
