 gaullism_auth:0 "威权戴高乐主义"
 gaullism_auth_desc:0 "§H威权戴高乐主义§!\n\n\n\n\n\n\n£img_gaullism \n\n\n\n\n\n\n戴高乐主义是一种独特的法国政治现象，其精髓可以用五个字来概括：法国例外论。它诞生于第二次世界大战末期那个历经摧残、惨遭失败，以及最不堪的——蒙受屈辱的法国，并由与其同名的夏尔·戴高乐所倡导。戴高乐主义最根本的原则是：法国决不能再在世界舞台上蒙受屈辱。即使在军事联盟和经济共同体内部，也绝不接受屈从于任何其他国家的地位。\n\n戴高乐主义充满了矛盾与不一致，它会在必要时同时采纳左翼和右翼的原则，以维系一个强大的法兰西身份认同。在戴高乐主义之下，国家是法国人民的先锋队，保护民众免受内外部的斗争。对外，戴高乐主义坚定不移地致力于维护法兰西民族的主权与威望；对内，它保护人民，防止国家因激进意识形态而四分五裂，并确保所有法国人的福祉。这使其与那些企图掏空法国并按自己构想来重建她的左右两翼激进分子都无法相容。\n\n§2伦敦之路§!，§W途经阿尔及尔，跋涉于比尔哈凯姆§!，§R最终迈向希望的集结。§!"
 techno_commie:0 "科技共产主义"
 techno_commie_desc:0 "§H科技共产主义§!\n\n\n\n\n\n\n£GFX_img_techno_com \n\n\n\n\n\n\n科技共产主义是共产主义的一个分支，它尤为强调科学社会主义的重要性。它旨在通过一条依靠科学的实践路径，来消除人剥削人的现象，并建立一个摆脱了资本主义内在矛盾的、崭新的社会结构。\n\n通过人类的发展轨迹及其自身的理论框架，该思想凝结出一个结论：只有走上科技极致发展的道路，才能实现人类革命的伟大飞跃——共产主义。它主张人的本质是无限的，永远在探索和超越自我。正是凭借人类这种永不停歇的攀升，遥远的目标才终将不会沦为空想的乌托邦。因为终有一天，人类的足迹将踏遍星辰大海，乃至更遥远的彼方。"
 radical_republicanism:0 "激进共和主义"
 radical_republicanism_desc:0 "§H激进共和主义§!£\n\n\n\n\n\n\n£img_radical_republicanism \n\n\n\n\n\n\n十九世纪，激进共和主义在欧洲兴起，成为当时声势浩大的共和运动中，立场最为坚定、绝不妥协的一派。它融合了法国大革命的民主平等理念，以及1848年革命浪潮中迸发出的社会激进思潮。与那些满足于建立议会、保留君主立宪的温和派不同，激进派的核心思想，是对君主制毫不妥协的敌视。在他们眼中，王权体制就是压迫、不公与特权的象征。激进共和党人所追求的，是一场彻头彻尾的社会变革：他们坚信，无论在政治、社会还是经济层面，都必须彻底摧毁世袭的等级制度，并代之以人人平等的民主架构。\n\n时至今日，只要“民主和社会共和国”这句口号依然响亮，他们的精神遗产便得以延续。这份遗产的核心在于一种坚持：若没有博爱，不能让每个人都活得有物质尊严，那么自由与平等便只是一句空谈。"
 fourth_way_social_democracy:0 "第四道路社会民主主义"
 fourth_way_social_democracy_desc:0 "§H第四道路社会民主主义§!\n\n\n\n\n\n\n£img_fourth_way \n\n\n\n\n\n\n东方共产主义阵营的垮台，对共产主义者而言是一场巨大的灾难；但对于那些政党来说，这却是一个机遇。\n\n这一思潮被称为“第四道路”，意在与当时西方流行的社会民主主义分庭抗礼。它沿袭了社会民主主义的某些原则与风格，例如议会主义和福利制度。与此同时，它在社会市场经济中表现出更强的干预性，在立场上秉持爱国主义以对抗西方，并在外交政策上与苏联保持着相当紧密的关系。尽管该意识形态声称借鉴了旧式的社会民主主义，但其主要源头可以追溯至1990年。当时，为了在新的世界格局中求得生存，许多前共产党被迫进行了改革。"
 gaullism_left:0 "左翼戴高乐主义"
 gaullism_left_desc:0 "§H左翼戴高乐主义§!\n\n\n\n\n\n\n£img_gaullism \n\n\n\n\n\n\n戴高乐主义是一种独特的法国政治现象，其精髓可以用五个字来概括：法国例外论。它诞生于第二次世界大战末期那个历经摧残、惨遭失败，以及最不堪的——蒙受屈辱的法国，并由与其同名的夏尔·戴高乐所倡导。戴高乐主义最根本的原则是：法国决不能再在世界舞台上蒙受屈辱。即使在军事联盟和经济共同体内部，也绝不接受屈从于任何其他国家的地位。\n\n戴高乐主义充满了矛盾与不一致，它会在必要时同时采纳左翼和右翼的原则，以维系一个强大的法兰西身份认同。在戴高乐主义之下，国家是法国人民的先锋队，保护民众免受内外部的斗争。对外，戴高乐主义坚定不移地致力于维护法兰西民族的主权与威望；对内，它保护人民，防止国家因激进意识形态而四分五裂，并确保所有法国人的福祉。这使其与那些企图掏空法国并按自己构想来重建她的左右两翼激进分子都无法相容。\n\n§2伦敦之路§!，§W途经阿尔及尔，跋涉于比尔哈凯姆§!，§R最终迈向希望的集结。§!"
 gaullism_neo:0 "新戴高乐主义"
 gaullism_neo_desc:0 "§H新戴高乐主义§!\n\n\n\n\n\n\n£img_gaullism \n\n\n\n\n\n\n戴高乐主义是一种独特的法国政治现象，其精髓可以用五个字来概括：法国例外论。它诞生于第二次世界大战末期那个历经摧残、惨遭失败，以及最不堪的——蒙受屈辱的法国，并由与其同名的夏尔·戴高乐所倡导。戴高乐主义最根本的原则是：法国决不能再在世界舞台上蒙受屈辱。即使在军事联盟和经济共同体内部，也绝不接受屈从于任何其他国家的地位。\n\n戴高乐主义充满了矛盾与不一致，它会在必要时同时采纳左翼和右翼的原则，以维系一个强大的法兰西身份认同。在戴高乐主义之下，国家是法国人民的先锋队，保护民众免受内外部的斗争。对外，戴高乐主义坚定不移地致力于维护法兰西民族的主权与威望；对内，它保护人民，防止国家因激进意识形态而四分五裂，并确保所有法国人的福祉。这使其与那些企图掏空法国并按自己构想来重建她的左右两翼激进分子都无法相容。\n\n§2伦敦之路§!，§W途经阿尔及尔，跋涉于比尔哈凯姆§!，§R最终迈向希望的集结。§!"
 paternalistic_conservatism:0 "家长式保守主义"
 paternalistic_conservatism_desc:0 "§H家长式保守主义§!\n\n\n\n\n\n\n£img_conservatism \n\n\n\n\n\n\n家长式保守主义是保守主义思潮中的一个务实分支，其核心理念在于将传统的等级制度与社会守护责任相结合。该思想认为，社会是一个自然形成的有机体，家庭、教会、企业和国家等各个部分各司其职；但它同时主张，那些在社会上占有优势地位的精英阶层，负有道义上的责任去照顾并提携弱势群体，一如父母养育子女。\n\n家长式保守主义的思想源头，可以追溯到埃德蒙·伯克的著作以及本杰明·迪斯雷利的“一国保守主义”理论，并在后者手中被赋予了鲜明的政治色彩。这一派思想家承认社会不平等的存在是必然的，但他们摒弃了自由放任主义那种事不关己的冷漠态度。他们主张进行适度的政府干预，例如推行公共卫生、普及基础教育、建立社会保险制度，以此来调和阶级矛盾，挽救国家于危亡之中。这种观点认为，权力的行使必须与仁爱并行：“位高则任重”的信念，绝非仅仅是一种道德上的门面装饰。"
 kemalism:0 "新凯末尔主义"
 kemalism_desc:0 "§H新凯末尔主义§!\n\n\n\n\n\n\n£img_kemalism \n\n\n\n\n\n\n昔日的凯末尔主义究竟为何物已不再重要。重要的是，在取得全面胜利之后，土耳其的军队守护者们所决定的那个版本。这是一种高度世俗化和民族主义的意识形态，其核心在于政教分离，并极力强调西方化与现代化，以及民族统一与凝聚的必要性。它进一步发展出坚决反对国内外落后原教旨主义势力的立场。或者说，新凯末尔主义进一步寻求巩固凯末尔革命的成果以对抗所有反对者，并将其推行至他处，以实现凯末尔“国内和平，世界和平”的目标。在某些情况下，新凯末尔主义也会运用左翼言论和爱国主义来对抗反土耳其的帝国主义。"
 NNA_military_junta_auth_desc: "§4北约军事任务指挥部§!\n\n\n\n\n\n\n£img_NATOWAVE \n\n\n\n\n\n\n这是一种多边的军事指挥框架。在此框架中，由一个北约主导成员国或一个指定的联盟总部来行使一支联合部队的作战指挥权，以规划、指导并协调跨参与国的军事行动。该框架由美国司令部牵头并实施监督。"
 IRQ_military_junta_auth_desc: "§4北约军事任务指挥部§!\n\n\n\n\n\n\n£img_NATOWAVE \n\n\n\n\n\n\n这是一种多边的军事指挥框架。在此框架中，由一个北约主导成员国或一个指定的联盟总部来行使一支联合部队的作战指挥权，以规划、指导并协调跨参与国的军事行动。该框架由美国司令部牵头并实施监督。"
 monarchism_corpo: "君主财阀制"
 monarchism_corpo_desc: "§H$monarchism$\n  £texticon_sub_under  $monarchism_corpo$§!\n\n\n\n\n\n\n£img_monarchism_corpo \n\n\n\n\n\n\n君主财阀制体现了世袭统治与企业霸权的融合。在此体制中，王权与技术官僚的董事会相互交织，同为治理之器。君主不仅是至高无上的主权统治者，更是国家的最高股东。权力同时流经企业集团与皇室王朝，形成一个无缝的等级体系，将国家与企业之间的界限彻底模糊。这既是在满足王权的野心，亦是在服务他们自身的私利。然而，在这层光鲜亮丽的表皮之下，潜藏着的是不受制约的贪婪与混乱不堪的冲突所带来的危机。\n\n当市场开始支配政策、当忠诚可以用金钱收买而非靠德行赢得时，治理与剥削之间的界限便会荡然无存。一个由王权与资本共同主宰的国度或许能取得巨大的繁荣，但这繁荣能维系多久，全在于其君主是否铭记：一个王国，抑或一个帝国，终究不能永远像一家企业那样来运营。贪婪这颗头颅，终究只会枕靠在一侧的肩膀，而无法兼顾王权与资本双方。"
 PER_bolivarianism_desc:0 "$PER_shia_islamism_desc$"
 PER_national_democracy_desc:0 "$PER_shia_islamism_desc$"
 auth_tridemism:0 "三民主义"
 auth_tridemism_desc:0 "§Y三民主义§!\n\n\n\n\n\n\n£img_tridemism \n\n\n\n\n\n\n§g三民主义§!，是旨在推翻满清王朝的资产阶级民主革命——辛亥革命——的理论基础。它由孙中山于1905年秋在《民报》上首次提出。\n\n§g民族主义§! - 源于“百年国耻”的苦难，当时的中国备受西方列强压迫。虽为大国，人口众多，却如一盘散沙，是世界上最贫穷、最衰弱的国家。它有宗族主义和家族主义，却缺乏民族意识。因此，救国之关键在于恢复民族主义。复兴中华传统道德价值观，是重拾中国昔日伟大、使其重焕光彩的最关键一步。唯有如此，国家地位方可恢复。然而，孙中山所倡导的民族主义是一种“真正的民族精神”，旨在基于共同利益与其他民族建立平等关系。只有当世界各国力量均衡，方能搁置各自利益，拥抱一种更广阔、更包容的“大同主义”。\n\n§2民权主义§! - 意为将政权交予人民之手。如此，则人民为皇帝。民主政治以人民为主人翁。公民是所有者——有权者——而政府则由专家，即有能者组成。国家的根基必须建立在人民的权利之上，但政府的运作应托付给专业人士。因此，所有政府官员，无论是总统、副部长还是部长，都可视作“司机”。只要他们有能力且忠于国家，人民就应赋予他们巨大的权力，不限制其行动，并给予他们处理事务的自由。唯有如此，国家方能进步。\n\n§R民生主义§! - 在一个完美的民主制度中，与民族主义和民权主义并列，民生主义占据着至关重要的地位。它代表了对人类生存的追求，是社会进步的驱动力。民生是政治、经济及一切历史活动的核心。它涵盖了人民的生活、社会的存续、国家的生计以及大众的福祉。"
