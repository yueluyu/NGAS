 PRC_socialism_party_long:0 "中国共产党(the Communist Party of China)§F\n--------------\n1989年的天安门事件及随后的灾难性处理使得时任中共中央总书记赵紫阳倒台，其改革派也随之崩盘。在“稳定高于一切”的理论下，人文马克思派干部与政治改革派再无出路可寻。唯有随着时间慢慢凋零...§!\n"
 PRC_social_democracy_party:0 "中国农工民主党"
 PRC_social_democracy_party_long:0 "中国农工民主党(CPWDP)§F\n--------------\n1945年抗战结束后国民政府宣布改组宪政，诸多政党如雨后春笋一般冒出。而在国民政府覆灭后。其原有体系内的一部分政党选择了同中共合作。形成了八大民主友党格局。不过由于中共对军队及行政体系的牢牢掌握，所谓民主党派所能做的事情实在有限§!\n"
 PRC_liberalism_party:0 "中国民主同盟/民主促进会(CADL/CAPD)"
 PRC_liberalism_party_long:0 "中国民主同盟/民主促进会(CADL/CAPD)§F\n--------------\n1945年抗战结束后国民政府宣布改组宪政，诸多政党如雨后春笋一般冒出。而在国民政府覆灭后。其原有体系内的一部分政党选择了同中共合作。形成了八大民主友党格局。不过由于中共对军队及行政体系的牢牢掌握，所谓民主党派所能做的事情实在有限§!\n"
 PRC_neutrality_party:0 "中国共产党"
 PRC_neutrality_party_long:0 "中国共产党(the Communist Party of China)§F\n--------------\n“黑猫白猫，能抓老鼠就是好猫”由于新时代共产党人所采取的现实主义政策，其一部分党员已采取了更为现实的执政方针。其手段与目标已经很难再被称为社会主义。不过也有相当一部分支持人称这是新时代为了维护人民共和国的必要之恶§!\n"
