 libertarian_socialism:0 "自由意志社会主义"
 libertarian_socialism_desc:0 "自由意志社会主义是一种反权威、反资本主义的政治思潮，强调自我治理与工人自治管理。它与其他社会主义形式的区别在于拒绝国家所有制，与其他自由意志主义的区别在于拒绝私有财产制。广义而言，这一思潮涵盖无政府主义与马克思主义的多个学派，以及其他反对国家与资本主义的思想流派。\n\n自由意志社会主义的根源可追溯至启蒙时代。在国际工人协会（第一国际）内部反权威派别与马克思主义派别的论争中，它首次形成明确的思想倾向。该思潮迅速传播至欧洲与美洲大陆，在1917年俄国革命的早期阶段达到发展高峰，并在1936年西班牙革命期间尤为兴盛。这两场革命中自由意志社会主义力量的挫败使其一度衰落，直至20世纪末新左翼运动与新兴社会运动再次复兴其核心理念。\n\n尽管分权自治、工人控制与互助合作等核心原则在自由意志社会主义各学派间基本形成共识，但在革命自发性、改良主义路径、以及应当优先废除国家还是资本主义等问题上仍存在分歧。"
