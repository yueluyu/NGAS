 titoism:0 "铁托主义"
 titoism_desc:0 "§H铁托主义§!\n\n\n\n\n\n\n£img_titoism \n\n\n\n\n\n\n铁托主义是是由约瑟普·布罗兹·铁托于二战后在南斯拉夫发展并实践的一种社会主义学说。它支持工人通过自治的工人委员会对企业进行自主管理。其经济政策混杂了社会主义原则与对部分私营经济的放开以及允许自由市场。其政治体系支持各民族平等以及在一个多民族国家建立某种程度的中央集权。铁托主义与其他社会主义模式相比的特殊设想意图通过为各企业、地区与加盟共和国提供政治和经济权力以平衡工人权利、少数民族代表权与其独特的经济模式。"
 fascist_populism:0 "法西斯民粹主义"
 fascist_populism_desc:0 "§H法西斯民粹主义§!\n\n\n\n\n\n\n£img_nationalism \n\n\n\n\n\n\n法西斯主义通常与独裁统治和威权政治相联系。不过，与普遍认知不同，民粹主义的法西斯主义非常看重民主制度，当然前提是必须由他们赢得选举。民粹法西斯主义拒斥各种阶级观念导出的理论与定义，而相反着重强调国家与公民的关系。由此，他们通过宣扬某种“过往的辉煌”或“民族的耻辱”来孕育一种民族精神，进而为人民提供动力以建设世上最为“纯净”和强大的国家。"
