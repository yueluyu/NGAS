 sunni_islamism:0 "逊尼伊斯兰主义"
 sunni_islamism_desc:0 "§H逊尼伊斯兰主义§!\n\n\n\n\n\n\n£img_islamism \n\n\n\n\n\n\n逊尼伊斯兰主义强调基于逊尼派原则的治理模式，主要是坚持建立某种严格遵循沙里亚宗教法的政治体制。该意识形态强调将全体穆斯林“乌玛”或社区统一在单一领袖或哈里发国治下以确保伊斯兰教法与道德秩序在全社会的顺利推行。"
 wahhabiten_islamism:0 "瓦哈比主义"
 wahhabiten_islamism_desc:0 "§H$wahhabiten_islamism$§!\n\n\n\n\n\n\n£img_islamism_wahhabism \n\n\n\n\n\n\n瓦哈比主义根植于18世纪教法学家穆罕穆德·伊本·阿卜杜勒·瓦哈卜的教诲，属于对逊尼伊斯兰主义的原教旨和极端保守化的解读。该意识形态强调对古兰经和圣训的绝对服从，拒斥一切创新理念并宣称要净化伊斯兰教中不够伊斯兰化的习俗。瓦哈比主义支持建立由沙里亚教法管理的伊斯兰国家，并重点关注对伊斯兰教经典的字面解读。"
 shia_islamism:0 "什叶伊斯兰主义"
 shia_islamism_desc:0 "§H什叶伊斯兰主义§!\n\n\n\n\n\n\n£img_islamism_shia \n\n\n\n\n\n\n什叶伊斯兰主义思想基于这样一种政治理论，那就是在一个作为隐遁的伊玛目在人间的代行者的宗教人物领导下，政府应当在伊斯兰教什叶派的宗教理论指导之下运作。这一意识形态着重强调正义、反抗压迫以及对什叶派群体的保护。什叶伊斯兰主义运动通常呼吁建立由教士领导的伊斯兰主义政府，其中最高领袖同时拥有宗教和政治权威。"
