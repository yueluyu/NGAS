l_simp_chinese:
 PRC_NDB_DESC_LOC:0 "世界上人口最多的国家，历经半个世纪的革命、建设与改革，从贫穷落后的农业国成长为亚洲最具活力的新兴力量之一，无数挑战都未能阻挡这个古老文明迈向现代化的脚步。然而，新的时代也带来了新的考验。\n\n八十年代后，中国正处于高速发展的关键阶段。沿海地区的繁荣与内陆地区的发展滞后形成鲜明对比。\n\n在邓小平南方谈话所奠定的发展道路上，江泽民领导下的中国共产党继续推动改革开放。一切好像都随着好的方向发展。\n\n但在繁荣景象背后，这个国家依旧面临着诸多难题。中国究竟能够顺利完成现代化转型，还是会在发展的阵痛中遭遇新的危机？答案仍隐藏在新世纪的迷雾之中……"
 PRC_desc:0 "鸦片战争爆发后，中国逐渐沦为半殖民地半封建社会。列强的侵略、军阀的混战以及连绵不断的社会危机，使国家的发展陷入停滞。无数仁人志士试图寻找救国之路，从洋务运动到戊戌变法，从辛亥革命到新文化运动，各种尝试接踵而至，却始终未能彻底改变中国的命运。\n\n1921年7月，中国共产党成立。自此，中国革命进入了新的阶段。在中国共产党的领导下，中国人民经过长期艰苦斗争，最终取得了抗日战争和解放战争的胜利。1949年10月1日，中华人民共和国宣告成立，中国人民从此站了起来。\n\n新中国成立后，国家迅速开展社会主义建设。尽管经历了曲折与困难，中国依旧建立起完整的工业体系和国民经济基础。1978年，中国共产党作出改革开放的历史性决策，社会主义现代化建设由此进入新的时期。经济特区的设立、市场经济体制的探索以及对外开放政策的实施，使中国逐渐摆脱贫困落后的局面，并重新融入世界经济体系。\n\n改革开放的推进极大激发了社会活力，但快速发展也带来了新的矛盾与问题。20世纪80年代后期，经济体制转轨过程中出现通货膨胀、腐败现象以及思想观念上的分歧，引发了社会各界对于国家未来发展的广泛讨论。1989年春夏之交，中国爆发了一场影响深远的政治风波。最终，在中国共产党的领导下，国家恢复了社会秩序与政治稳定，并继续坚持改革开放的基本方向。\n\n这场风波深刻影响了中国未来的发展道路。此后，中央更加重视稳定与发展之间的平衡，坚持以经济建设为中心，同时加强国家治理能力建设。1992年邓小平发表南方谈话，进一步坚定了改革开放的方向，中国由此进入新一轮经济快速发展的时期。\n\n站在新世纪的门槛之上。从黄河到长江，从东北工业基地到南方经济特区，无数建设者正在为国家的未来而奋斗。这个拥有十三亿人口的国家，究竟能够抓住全球化带来的历史机遇，实现民族复兴的宏伟目标，还是会在发展过程中遭遇新的挑战与考验？答案仍等待时间去揭晓。"
