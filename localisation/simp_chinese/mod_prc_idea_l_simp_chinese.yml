 Chinese_path:0 "§O中国特色社会主义道路§!"
 Chinese_path_desc:0 "\n\n\n\n\n£GFX_PRC_Chinese_path \n\n\n\n\n\n“具有中国特色的社会主义”，是邓小平在十二大中提出“基本结论。作为科学社会主义的基本原则与中国实际相结合的产物，具有鲜明的时代特征和中国特色。\n\n中国特色社会主义道路，是党在改革开放与社会主义现代化建设过程中逐渐形成的发展道路，是二十世纪末我国社会转型的重要成果，也是新世纪中国继续发展的根本方向，更是我们的立国之本、强国之路。"
 Development_of_western_regions:0 "西部大开发"
 Development_of_western_regions_desc:0 "自对外开放以来，我国的区域发展出现了明显的不平衡。东部沿海地区凭借改革开放的先发优势迅速崛起，高楼与工厂遍布海岸线；而广袤的西部地区，却依然面临基础设施落后、产业薄弱和人才流失等问题。这样的差距不仅影响国家整体发展，也不利于长期稳定与民族团结。\n\n党中央决定正式启动“西部大开发”战略，通过加大财政投入、建设交通网络、开发能源资源和扶持特色产业，推动西部地区融入全国经济体系。从青藏高原到黄土高坡，从天山脚下到云贵山区，铁路、公路、电网和通信线路将跨越群山与荒漠，把发展的机遇带向最辽阔的土地。"
 Development_of_western_regions_tt:0 "§W--------------§!\n以下§Y地区§!将得到§G西部大开发§!修正：\n§Y内蒙古自治区§!、§Y广西壮族自治区§!、§Y西藏自治区§!、§Y宁夏回族自治区§!、§Y新疆维吾尔自治区§!\n§Y四川省§!、§Y贵州省§!、§Y云南省§!、§Y陕西省§!、§Y甘肃省§!、§Y青海省§!\n§R重庆市§!"
