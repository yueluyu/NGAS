 Chinese_path:0 "§O中国特色社会主义道路§!"
 Chinese_path_desc:0 "\n\n\n\n\n£GFX_PRC_Chinese_path \n\n\n\n\n\n"Socialism with Chinese characteristics" is the basic conclusion put forward by Deng Xiaoping at the 12th National Congress. As the product of combining the basic principles of scientific socialism with China's actual conditions, it has distinct features of the times and Chinese characteristics.\n\nThe path of socialism with Chinese characteristics is the development path gradually formed by the Party in the course of reform and opening up and socialist modernization. It is an important achievement of China's social transformation at the end of the 20th century, the fundamental direction for China's continued development in the new century, and the foundation of our nation and the path to a stronger country."
 Development_of_western_regions:0 "西部大开发"
 Development_of_western_regions_desc:0 "Since the implementation of reform and opening up, China has experienced significant regional imbalances in development. Leveraging the early-mover advantages of the policies, the eastern coastal regions rose rapidly, with skyscrapers and factories lining the coast. In stark contrast, the vast western regions continue to grapple with challenges such as lagging infrastructure, weak industrial bases, and a brain drain. This disparity not only hinders the nation's overall development but also poses challenges to long-term stability and national unity.\n\nIn response, the Party Central Committee officially launched the "Western Development Strategy." By increasing fiscal investment, building transportation networks, developing energy resources, and supporting distinctive local industries, the strategy aims to integrate the western regions into the national economic system. From the Qinghai-Tibet Plateau to the Loess Plateau, and from the foothills of the Tianshan Mountains to the mountainous areas of Yunnan and Guizhou, railways, highways, power grids, and communication lines will traverse mountains and deserts, bringing the opportunities of development to the most expansive lands."
 Development_of_western_regions_tt:0 "§W--------------§!\nThe following §Yregions§! will receive the §GWestern Development Strategy§! modifier:\n§YInner Mongolia Autonomous Region§!, §YGuangxi Zhuang Autonomous Region§!, §YTibet Autonomous Region§!, §YNingxia Hui Autonomous Region§!, §YXinjiang Uygur Autonomous Region§!\n§YSichuan Province§!, §YGuizhou Province§!, §YYunnan Province§!, §YShaanxi Province§!, §YGansu Province§!, §YQinghai Province§!\n§RChongqing Municipality§!"
