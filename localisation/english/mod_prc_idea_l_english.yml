 hei_e_shili:0 "复杂的社会治安"
 hei_e_shili_desc:0 "随着市场化改革不断深入，原有的社会秩序正在被迅速打破。大量农村人口持续涌入城市，沿海与内地之间的发展差距也在不断扩大。高速增长的经济带来了繁荣，却同样滋生出失业、贫困与社会不安。曾经依附于单位制度而维持的基层管理体系逐渐瓦解，而新的社会保障与治安体系却尚未完全建立。\n\n与此同时，盗窃、抢劫、黑恶势力以及走私犯罪开始在部分地区蔓延。一些老工业城市因经济衰退而陷入长期萧条，地方政府财政压力加剧，基层治理能力也随之下降。人口流动的增加与互联网时代的到来，则进一步放大了社会管理的难度。"
 hei_e_shili_1:0 "复杂的社会治安"
 xia_gang_chao:0 "下岗潮"
 xia_gang_chao_desc:0 "\n\n\n\n\n£GFX_PRC_Wave_of_layoffs \n\n\n\n\n\n自改革开放以来，国有企业始终承受着市场化浪潮所带来的冲击。进入九十年代后，大量国企逐渐暴露出效率低下、亏损严重以及“三角债”蔓延等问题，原有的计划经济体系已难以继续维持。为了挽救濒临停滞的工业体系，中央不得不推动大规模国企重组，而随之而来的，则是席卷全国的下岗潮。\n\n数以百万计的工人失去了原本稳定的工作与福利保障。曾经依附于国企而存在的生活秩序被迅速打破，许多老工业城市也因此陷入萧条。尽管沿海经济的高速发展与民营资本扩张创造出了新的就业机会，但这些岗位远远无法消化庞大的失业人口。大量下岗职工游离于社会体系之外，由此引发的不安、动荡与社会创伤，注定需要漫长时间才能抚平。"
 xia_gang_chao_tt:0 "§R每4个月将会拆除1个§Y民用工厂§!§!"
 xia_gang_chao_2:0 "下岗潮"
 xia_gang_chao_2_desc:0 "\n\n\n\n\n£GFX_PRC_Wave_of_layoffs \n\n\n\n\n\n自改革开放以来，国有企业始终承受着市场化浪潮所带来的冲击。进入九十年代后，大量国企逐渐暴露出效率低下、亏损严重以及“三角债”蔓延等问题，原有的计划经济体系已难以继续维持。为了挽救濒临停滞的工业体系，中央不得不推动大规模国企重组，而随之而来的，则是席卷全国的下岗潮。\n\n由于一系列引入外资、扩大出口的政策逐步实施，国内经济开始出现复苏迹象。沿海地区的工厂如雨后春笋般不断建立，流水线昼夜运转，大量劳动力被迅速吸纳进新兴工业体系之中。曾经因“大下岗”而积累的过剩人口，也正在全球化与工业扩张的浪潮里，逐渐转变为支撑我们经济高速增长的劳动力红利。"
 xia_gang_chao_2_tt:0 "§R每6个月将会拆除1个§Y民用工厂§!§!"
