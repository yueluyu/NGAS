 army_jing_shang_desc:0 "改革开放以后，国家集中财力发展经济。军队服从国家经济建设的大局，贯彻要“忍耐”的方针，军费减少，不足部分需自筹解决。八十年代末，中央提出，要给军队一个政策，叫做“自我发展，自我完善”。于是军队以盈利挣钱、弥补经费不足为目的的经营性生产逐步发展起来。\n\n虽说当前在明面上不再进行，但仍保留了一些领域可以开展有偿服务活动，仍然存在军队经商的情况。"
